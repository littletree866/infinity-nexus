<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Roulette</title>
    <link rel="icon" type="image/x-icon" href="../../icon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 20% 30%, #0a0c1a 0%, #02040c 100%);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* main container */
        .roulette-premium {
            max-width: 1400px;
            width: 100%;
            background: rgba(5, 8, 18, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 1.8rem;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
        }

        /* header */
        .luxury-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.8rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
        }
        .title h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6A7, #D4AF37, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .stats-floater {
            display: flex;
            gap: 1rem;
        }
        .stat-chip {
            background: #151e2acc;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            border: 1px solid #d4af37;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #c9b16b;
        }
        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            font-family: 'Space Grotesk', monospace;
            color: #f5e7b2;
        }

        /* 2-col layout */
        .game-split {
            display: grid;
            grid-template-columns: 1fr 0.9fr;
            gap: 1.8rem;
        }
        @media (max-width: 1000px) {
            .game-split { grid-template-columns: 1fr; }
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .roulette-premium { padding: 1.2rem; border-radius: 32px; }
            .luxury-header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
            .stats-floater { flex-direction: column; width: 100%; }
            .wheel-wrapper { max-width: 360px; margin: 0 auto; }
            .spin-btn-custom { width: 100%; padding: 1rem; font-size: 1.05rem; }
            .chip-selector { justify-content: center; }
            .chip-item { width: 60px; height: 60px; }
            .bet-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
            .num-btn { padding: 0.8rem 0; font-size: 1rem; }
            .bet-type-group { justify-content: center; }
            .action-buttons { flex-direction: column; }
            .btn-action { width: 100%; }
            .result-area { font-size: 0.95rem; }
        }

        @media (max-width: 480px) {
            .roulette-premium { padding: 1rem; }
            .luxury-header { width: 100%; }
            .title h1 { font-size: 1.6rem; }
            .stats-floater { gap: 0.6rem; }
            .wheel-wrapper { max-width: 300px; }
            .wheel-canvas { box-shadow: 0 0 0 10px #2a2533, 0 18px 38px rgba(0,0,0,0.6); }
            .chip-selector { gap: 0.5rem; justify-content: center; }
            .chip-item { width: 52px; height: 52px; font-size: 0.95rem; }
            .bet-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .bet-type { flex: 1 1 45%; }
            .num-btn { padding: 0.7rem 0; font-size: 0.95rem; }
            .result-area { padding: 0.85rem; }
            footer { font-size: 0.72rem; }
        }

        /* wheel side */
        .wheel-cosmic {
            background: linear-gradient(145deg, #0e1428, #030614);
            border-radius: 40px;
            padding: 1.5rem;
            border: 1px solid rgba(212, 175, 55, 0.5);
            text-align: center;
        }
        .wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
        }
        .wheel-canvas {
            width: 100%;
            aspect-ratio: 1;
            background: radial-gradient(circle at 30% 30%, #1f253f, #03050c);
            border-radius: 50%;
            box-shadow: 0 0 0 12px #2a2533, 0 20px 40px black;
            position: relative;
            transition: transform 4s cubic-bezier(0.2, 0.96, 0.3, 1);
            transform-origin: center;
            cursor: pointer;
        }
        .pointer {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 28px solid transparent;
            border-right: 28px solid transparent;
            border-top: 52px solid #FFD966;
            filter: drop-shadow(0 5px 12px gold);
            z-index: 10;
        }
        .roulette-premium {
            max-width: 1400px;
            width: 100%;
            background: rgba(5, 8, 18, 0.8);
            color: #efe9d7;
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 1.8rem;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
        }

        .spin-btn-custom {
            margin-top: 1.5rem;
            background: linear-gradient(95deg, #8a62d8, #c084fc);
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #0b0618;
            cursor: pointer;
            transition: 0.15s;
            width: 80%;
            box-shadow: 0 6px 16px #7c3aed66;
        }
        .spin-btn-custom:hover:not(:disabled) { transform: scale(1.02); filter: brightness(1.05); }
        .spin-btn-custom:disabled { opacity: 0.5; cursor: default; }

        .home-btn {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 20;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(18, 22, 40, 0.95);
            color: #ffd966;
            border: 1px solid rgba(255, 217, 102, 0.35);
            padding: 0.8rem 1rem;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            box-shadow: 0 12px 28px rgba(0,0,0,0.25);
            transition: transform 0.15s ease, background 0.15s ease;
        }
        .home-btn:hover { transform: translateY(-1px); background: rgba(30, 35, 64, 0.96); }

        /* betting panel */
        .bet-panel {
            background: rgba(10, 14, 26, 0.8);
            border-radius: 36px;
            padding: 1.5rem;
            border: 1px solid #c9ac4d;
        }
        .chip-selector {
            display: flex;
            gap: 0.7rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .chip-item {
            background: radial-gradient(circle at 30% 30%, #2c2c2c, #151515);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            border: 2px solid #b38f40;
            cursor: pointer;
            transition: 0.1s;
        }
        .chip-item.active {
            border-color: white;
            box-shadow: 0 0 18px gold;
            transform: scale(1.05);
        }
        .bet-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin: 1rem 0;
        }
        .num-btn {
            background: #171e30;
            border: 1px solid #4f3f78;
            border-radius: 14px;
            padding: 0.9rem 0;
            font-weight: 700;
            font-size: 1.1rem;
            color: #eee;
            cursor: pointer;
            transition: 0.1s;
        }
        .num-btn.green-special { background: #2e6b3e; grid-column: span 2; }
        .num-btn.red-tint { background: #942828; }
        .num-btn.black-tint { background: #1e1e2a; }
        .num-btn.selected { background: #d4af37; color: #0a0618; transform: scale(0.96); box-shadow: 0 0 15px gold; }
        .bet-type-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 1rem 0;
        }
        .bet-type {
            background: #101626;
            border: 1px solid #7e5bbe;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .bet-type.active {
            background: #9b59b6;
            color: white;
            border-color: gold;
        }
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .btn-action {
            flex: 1;
            background: #20273f;
            padding: 0.8rem;
            border-radius: 60px;
            font-weight: 700;
            border: none;
            color: #f0e6c5;
            cursor: pointer;
        }
        .btn-action.primary { background: #d4af37; color: #0c0b1a; }
        .bets-list {
            background: #00000044;
            border-radius: 24px;
            padding: 1rem;
            margin-top: 1rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .result-area {
            margin-top: 1rem;
            background: #0c0f1c;
            border-radius: 28px;
            padding: 1rem;
            text-align: center;
        }
        .history-bubbles {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .history-ball {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: #2a2e44;
        }
        .history-ball.win-bg { background: #00a86b; box-shadow: 0 0 8px #00ffaa; }
        .history-ball.lose-bg { background: #972b2b; }
        footer { text-align: center; margin-top: 1.5rem; font-size: 0.7rem; color: #aaa; }
    </style>
</head>
<body>
<a href="../../mainpages/mainpage1.html" class="home-btn">Casino</a>

<div class="roulette-premium">
    <div class="luxury-header">
            <div class="title"><h1>Roulette</h1></div>
        <div class="stats-floater">
            <div class="stat-chip"><div class="stat-label">Balance</div><div class="stat-value" id="balanceDisplay">1000</div></div>
            <div class="stat-chip"><div class="stat-label">Bet total</div><div class="stat-value" id="totalBetDisplay">0</div></div>
        </div>
    </div>
    <div class="game-split">
        <!-- LEFT: WHEEL -->
        <div class="wheel-cosmic">
            <div class="wheel-wrapper">
                <canvas class="wheel-canvas" id="wheelCanvas"></canvas>
                <div class="pointer"></div>
            </div>
            <button class="spin-btn-custom" id="spinWheelBtn">Spin wheel</button>
            <div class="result-area" id="resultMessageArea">
                <span id="lastResultText">Place your bet</span>
            </div>
        </div>

        <!-- RIGHT: BETTING -->
        <div class="bet-panel">
            <div><strong>Chip value</strong></div>
            <div class="chip-selector" id="chipSelector">
                <div class="chip-item" data-chip="1">1</div>
                <div class="chip-item" data-chip="5">5</div>
                <div class="chip-item" data-chip="10">10</div>
                <div class="chip-item" data-chip="25">25</div>
                <div class="chip-item" data-chip="50">50</div>
                <div class="chip-item" data-chip="100">100</div>
            </div>

            <div><strong>Number grid</strong></div>
            <div class="bet-grid" id="numberGrid"></div>

            <div><strong>Special bets</strong></div>
            <div class="bet-type-group" id="specialGroup">
                <div class="bet-type" data-special="single">Single</div>
                <div class="bet-type" data-special="even">Even</div>
                <div class="bet-type" data-special="odd">Odd</div>
                <div class="bet-type" data-special="red">Red</div>
                <div class="bet-type" data-special="black">Black</div>
                <div class="bet-type" data-special="low">1-18</div>
                <div class="bet-type" data-special="high">19-36</div>
                <div class="bet-type" data-special="dozen1">1st12</div>
                <div class="bet-type" data-special="dozen2">2nd12</div>
                <div class="bet-type" data-special="dozen3">3rd12</div>
            </div>

            <div class="action-buttons">
                <button class="btn-action primary" id="placeBetBtn">Place bet</button>
                <button class="btn-action" id="clearBetsBtn">Clear</button>
            </div>
            <div class="bets-list" id="activeBetsList">
                <div style="text-align:center; color:#b9a776;">No active bets</div>
            </div>
        </div>
    </div>
    <div class="result-area" style="margin-top:1rem;">
        <div><strong>Spin history</strong></div>
        <div class="history-bubbles" id="historyContainer"></div>
    </div>
    <footer>⚡ Classic European Roulette | Payouts: Single 35:1, Even/Odd/Red/Black/1-18/19-36/Dozen = 1:1</footer>
</div>

<script>
    // ---------- CONFIG ----------
    const NUMBERS = Array.from({length: 37}, (_, i) => i); // 0 to 36
    const RED_NUMS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    function getNumberColor(num) {
        if (num === 0) return 'green';
        return RED_NUMS.includes(num) ? 'red' : 'black';
    }

    let balance = 1000;
    let currentChip = 10;
    let activeBets = [];        // { number: X, amount: value, type: 'single'|'even'... }
    let selectedSpecial = 'single';
    let selectedNumbers = [];    // only for single mode
    let spinning = false;
    let spinHistory = [];

    // DOM elements
    const balanceSpan = document.getElementById('balanceDisplay');
    const totalBetSpan = document.getElementById('totalBetDisplay');
    const wheelCanvas = document.getElementById('wheelCanvas');
    const spinBtn = document.getElementById('spinWheelBtn');
    const numberGridDiv = document.getElementById('numberGrid');
    const specialBtns = document.querySelectorAll('.bet-type');
    const placeBetBtn = document.getElementById('placeBetBtn');
    const clearBetsBtn = document.getElementById('clearBetsBtn');
    const activeBetsListDiv = document.getElementById('activeBetsList');
    const lastResultSpan = document.getElementById('lastResultText');
    const historyContainer = document.getElementById('historyContainer');

    // ---------- HELPER: UPDATE UI BALANCE & BET TOTAL ----------
    function updateBalanceUI() {
        balanceSpan.innerText = Math.floor(balance);
        const totalBetAmount = activeBets.reduce((sum, b) => sum + b.amount, 0);
        totalBetSpan.innerText = totalBetAmount;
    }

    // ---------- RENDER WHEEL (canvas) with slices ----------
    const angleStep = (2 * Math.PI) / 37;
    function drawWheel(rotationRad = 0) {
        const ctx = wheelCanvas.getContext('2d');
        const size = wheelCanvas.clientWidth;
        wheelCanvas.width = size;
        wheelCanvas.height = size;
        const centerX = size/2, centerY = size/2, radius = size/2 - 8;

        ctx.clearRect(0, 0, size, size);
        for (let i = 0; i <= 36; i++) {
            const start = i * angleStep + rotationRad;
            const end = (i+1) * angleStep + rotationRad;
            const color = getNumberColor(i);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, start, end);
            ctx.fillStyle = color === 'red' ? '#c63232' : (color === 'green' ? '#2d7a4b' : '#1f1f2e');
            ctx.fill();
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(start + angleStep/2);
            ctx.fillStyle = 'white';
            ctx.font = `bold ${Math.max(12, size/18)}px "Space Grotesk"`;
            ctx.shadowBlur = 0;
            ctx.fillText(i.toString(), radius-22, 8);
            ctx.restore();
            ctx.strokeStyle = '#e0b85b';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, start, end);
            ctx.lineTo(centerX, centerY);
            ctx.stroke();
        }
        // inner circle
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius*0.18, 0, 2*Math.PI);
        ctx.fillStyle = '#F5C542';
        ctx.fill();
        ctx.fillStyle = '#1f1a2b';
        ctx.font = `bold ${size/14}px "Inter"`;
        ctx.fillText("★", centerX-8, centerY+6);
    }

    let currentRotation = 0;
    function resetWheel() { drawWheel(currentRotation); }
    window.addEventListener('resize', () => resetWheel());

    // ---------- CREATE NUMBER GRID ----------
    function buildNumberGrid() {
        numberGridDiv.innerHTML = '';
        // zero
        const zeroBtn = document.createElement('button');
        zeroBtn.innerText = '0';
        zeroBtn.classList.add('num-btn', 'green-special');
        zeroBtn.dataset.num = '0';
        zeroBtn.addEventListener('click', () => toggleNumberSelection(0));
        numberGridDiv.appendChild(zeroBtn);
        for (let i = 1; i <= 36; i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            btn.classList.add('num-btn');
            if (RED_NUMS.includes(i)) btn.classList.add('red-tint');
            else btn.classList.add('black-tint');
            btn.dataset.num = i;
            btn.addEventListener('click', () => toggleNumberSelection(i));
            numberGridDiv.appendChild(btn);
        }
    }

    function toggleNumberSelection(num) {
        if (spinning) return;
        if (selectedSpecial !== 'single') {
            selectedSpecial = 'single';
            updateSpecialButtons('single');
            selectedNumbers = [];
        }
        const idx = selectedNumbers.indexOf(num);
        if (idx === -1) selectedNumbers.push(num);
        else selectedNumbers.splice(idx,1);
        updateNumberHighlight();
    }

    function updateNumberHighlight() {
        document.querySelectorAll('.num-btn').forEach(btn => {
            const num = parseInt(btn.dataset.num);
            if (selectedNumbers.includes(num)) btn.classList.add('selected');
            else btn.classList.remove('selected');
        });
    }

    function updateSpecialButtons(currentType) {
        specialBtns.forEach(btn => {
            const val = btn.dataset.special;
            if (val === currentType) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // ---------- PLACE BET (single or special) ----------
    function placeBet() {
        if (spinning) { showTempMsg("Wait for spin to finish", "#c97e5a"); return; }
        let totalCost = 0;
        let newBets = [];

        if (selectedSpecial === 'single') {
            if (selectedNumbers.length === 0) { showTempMsg("Select at least one number", "#ffaa66"); return; }
            for (let num of selectedNumbers) {
                const amount = currentChip;
                totalCost += amount;
                newBets.push({ number: num, amount: amount, type: 'single', id: Date.now()+Math.random() });
            }
        } else {
            // special bet: even/odd/red/black/low/high/dozen
            totalCost = currentChip;
            newBets.push({ number: null, amount: currentChip, type: selectedSpecial, id: Date.now()+Math.random() });
        }

        if (totalCost > balance) { showTempMsg("Insufficient chips!", "#ff6b6b"); return; }
        balance -= totalCost;
        activeBets.push(...newBets);
        updateBalanceUI();
        renderBetList();
        // clear selection after bet placed (for single mode)
        if (selectedSpecial === 'single') {
            selectedNumbers = [];
            updateNumberHighlight();
        }
        showTempMsg(`Bet placed: +${totalCost} chips`, "#a3e0a0");
    }

    function clearAllBets() {
        if (spinning) return;
        const refund = activeBets.reduce((sum,b)=> sum + b.amount, 0);
        balance += refund;
        activeBets = [];
        updateBalanceUI();
        renderBetList();
        showTempMsg("Bets cleared, refunded", "#ffd966");
    }

    // render bet list with amounts
    function renderBetList() {
        if (activeBets.length === 0) {
            activeBetsListDiv.innerHTML = '<div style="text-align:center; color:#b9a776;">No active bets</div>';
            return;
        }
        let html = '';
        for (let bet of activeBets) {
            if (bet.type === 'single') {
                html += `<div style="display:flex; justify-content:space-between; background:#1c2138; margin:6px 0; padding:6px 12px; border-radius:40px;">
                            <span>Number ${bet.number}</span><span style="color:gold;">${bet.amount}</span>
                         </div>`;
            } else {
                let specialName = bet.type;
                if (bet.type === 'even') specialName = 'Even';
                if (bet.type === 'odd') specialName = 'Odd';
                if (bet.type === 'red') specialName = 'Red';
                if (bet.type === 'black') specialName = 'Black';
                if (bet.type === 'low') specialName = '1-18';
                if (bet.type === 'high') specialName = '19-36';
                if (bet.type === 'dozen1') specialName = '1st 12';
                if (bet.type === 'dozen2') specialName = '2nd 12';
                if (bet.type === 'dozen3') specialName = '3rd 12';
                html += `<div style="display:flex; justify-content:space-between; background:#1c2138; margin:6px 0; padding:6px 12px; border-radius:40px;">
                            <span>${specialName}</span><span style="color:gold;">${bet.amount}</span>
                         </div>`;
            }
        }
        activeBetsListDiv.innerHTML = html;
    }

    // check win for single bet and specials
    function checkBetWin(bet, winningNum, winningColor) {
        if (bet.type === 'single') return bet.number === winningNum;
        if (bet.type === 'even') return winningNum !== 0 && winningNum % 2 === 0;
        if (bet.type === 'odd') return winningNum !== 0 && winningNum % 2 === 1;
        if (bet.type === 'red') return winningColor === 'red';
        if (bet.type === 'black') return winningColor === 'black';
        if (bet.type === 'low') return winningNum >= 1 && winningNum <= 18;
        if (bet.type === 'high') return winningNum >= 19 && winningNum <= 36;
        if (bet.type === 'dozen1') return winningNum >= 1 && winningNum <= 12;
        if (bet.type === 'dozen2') return winningNum >= 13 && winningNum <= 24;
        if (bet.type === 'dozen3') return winningNum >= 25 && winningNum <= 36;
        return false;
    }

    function getPayout(bet) {
        if (bet.type === 'single') return bet.amount * 35;
        return bet.amount * 1;
    }

    // SPIN MECHANICS
    function spinWheel() {
        if (spinning) return;
        if (activeBets.length === 0) { showTempMsg("Place a bet before spinning!", "#ffaa77"); return; }
        spinning = true;
        spinBtn.disabled = true;
        const winningNumber = Math.floor(Math.random() * 37);
        const winningColor = getNumberColor(winningNumber);
        const extraSpins = 12 + Math.floor(Math.random() * 8);
        const targetAngle = (2 * Math.PI) * extraSpins + (winningNumber * angleStep) + (angleStep/2);
        currentRotation += targetAngle;
        const duration = 2800;
        const start = performance.now();
        const startRot = currentRotation - targetAngle;
        function animateSpin(now) {
            const elapsed = now - start;
            let t = Math.min(1, elapsed / duration);
            const easeOut = 1 - Math.pow(1-t, 3);
            const rot = startRot + targetAngle * easeOut;
            drawWheel(rot);
            if (t < 1) requestAnimationFrame(animateSpin);
            else {
                drawWheel(startRot + targetAngle);
                finalizeSpin(winningNumber, winningColor);
            }
        }
        requestAnimationFrame(animateSpin);
    }

    function finalizeSpin(winNum, winColor) {
        let totalWin = 0;
        let winCount = 0;
        for (let bet of activeBets) {
            if (checkBetWin(bet, winNum, winColor)) {
                const winAmount = getPayout(bet);
                totalWin += winAmount;
                winCount++;
            }
        }
        balance += totalWin;
        updateBalanceUI();
        const winText = totalWin > 0 ? `WIN ${totalWin} chips` : `LOSE: number ${winNum} ${winColor}`;
        lastResultSpan.innerHTML = `<span style="font-weight:bold;">${winNum} (${winColor})</span> - ${winText}`;
        if (totalWin > 0) {
            createMiniConfetti();
        }
        // add to history
        spinHistory.unshift({ num: winNum, color: winColor, win: totalWin > 0 });
        if (spinHistory.length > 16) spinHistory.pop();
        renderHistory();
        activeBets = [];
        renderBetList();
        spinning = false;
        spinBtn.disabled = false;
        if (balance <= 0) {
            lastResultSpan.innerHTML += "<br>Bankrupt. Refresh to restart.";
        }
    }

    function renderHistory() {
        historyContainer.innerHTML = '';
        for (let h of spinHistory) {
            const ball = document.createElement('div');
            ball.className = `history-ball ${h.win ? 'win-bg' : 'lose-bg'}`;
            ball.innerText = h.num;
            ball.title = `${h.num} (${h.color}) ${h.win ? 'Win' : 'Lose'}`;
            historyContainer.appendChild(ball);
        }
    }

    function showTempMsg(msg, colorHex = "#e0c87a") {
        const old = lastResultSpan.innerHTML;
        lastResultSpan.innerHTML = `<span style="color:${colorHex};">${msg}</span>`;
        setTimeout(() => {
            if (!spinning) lastResultSpan.innerHTML = old;
            else if(lastResultSpan.innerHTML.includes(msg)) lastResultSpan.innerHTML = old;
        }, 1500);
    }

    function createMiniConfetti() {
        for (let i=0;i<40;i++) {
            const conf = document.createElement('div');
            conf.style.position = 'fixed';
            conf.style.width = '8px';
            conf.style.height = '8px';
            conf.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
            conf.style.left = Math.random() * window.innerWidth + 'px';
            conf.style.top = '-20px';
            conf.style.pointerEvents = 'none';
            conf.style.zIndex = 9999;
            conf.style.borderRadius = '50%';
            document.body.appendChild(conf);
            conf.animate([
                { transform: 'translateY(0px) rotate(0deg)', opacity: 1 },
                { transform: `translateY(${window.innerHeight+50}px) rotate(${Math.random()*360}deg)`, opacity: 0 }
            ], { duration: 1500 + Math.random()*800, easing: 'cubic-bezier(0.4,0,0.2,1)' }).onfinish = () => conf.remove();
        }
    }

    // event listeners
    function init() {
        buildNumberGrid();
        resetWheel();
        drawWheel(0);
        // chip selector
        document.querySelectorAll('.chip-item').forEach(chip => {
            chip.addEventListener('click', () => {
                if (spinning) return;
                currentChip = parseInt(chip.dataset.chip);
                document.querySelectorAll('.chip-item').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
            });
        });
        document.querySelector('.chip-item[data-chip="10"]').classList.add('active');
        specialBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (spinning) return;
                selectedSpecial = btn.dataset.special;
                updateSpecialButtons(selectedSpecial);
                if (selectedSpecial !== 'single') selectedNumbers = [];
                updateNumberHighlight();
            });
        });
        placeBetBtn.addEventListener('click', placeBet);
        clearBetsBtn.addEventListener('click', clearAllBets);
        spinBtn.addEventListener('click', spinWheel);
        updateBalanceUI();
        renderBetList();
        // default single highlight
        updateSpecialButtons('single');
    }
    init();
</script>
</body>
</html>
