<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Slot Machine</title>
    <link rel="icon" href="../../icon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 20% 30%, #0a0c1a 0%, #02040c 100%);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Home button */
        .home-btn {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 20;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(18, 22, 40, 0.95);
            color: #ffd966;
            border: 1px solid rgba(255, 217, 102, 0.35);
            padding: 0.8rem 1rem;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            box-shadow: 0 12px 28px rgba(0,0,0,0.25);
            transition: transform 0.15s ease, background 0.15s ease;
        }
        .home-btn:hover { transform: translateY(-1px); background: rgba(30, 35, 64, 0.96); }

        /* Main slot container */
        .slot-mansion {
            max-width: 900px;
            width: 100%;
            background: rgba(5, 8, 18, 0.85);
            color: #efe9d7;
            border-radius: 56px;
            padding: 1.8rem;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 30px 45px rgba(0,0,0,0.7);
        }

        /* Header stats */
        .jackpot-stats {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            background: rgba(15, 17, 34, 0.8);
            border-radius: 60px;
            padding: 1rem 1.8rem;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(212, 175, 55, 0.4);
        }
        .stat-block {
            text-align: center;
        }
        .stat-label {
            font-size: 0.75rem;
            letter-spacing: 1.2px;
            color: #c9b16b;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
            color: #ffd966;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Slot Reels */
        .reels-area {
            background: linear-gradient(145deg, #0e1428, #030614);
            border-radius: 40px;
            padding: 1.5rem;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4), 0 10px 20px rgba(0,0,0,0.6);
        }
        .slot-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 1.5rem;
            aspect-ratio: 1;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .reel {
            background: radial-gradient(circle at 30% 35%, #1e1f32, #05070f);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            border: 2px solid #e5b83c;
            box-shadow: 0 0 0 2px #2a2618, inset 0 0 15px rgba(0,0,0,0.6);
            transition: 0.1s;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 20% 30%, #ffffff0c, transparent);
        }
        .reel.spinning {
            animation: reelShake 0.08s infinite;
        }
        @keyframes reelShake {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .reel.win-highlight {
            border-color: #ffd966;
            box-shadow: 0 0 12px gold, inset 0 0 15px gold;
            transform: scale(1.05);
        }

        /* Bet selector */
        .bet-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .bet-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .bet-chip-btn {
            background: rgba(27, 30, 48, 0.8);
            border: 2px solid #7e5bbe;
            padding: 0.6rem 1rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.1s;
            color: #ddd;
        }
        .bet-chip-btn.active {
            background: #d4af37;
            color: #100e1c;
            border-color: white;
            box-shadow: 0 0 12px gold;
        }
        .spin-gold {
            background: linear-gradient(95deg, #8a62d8, #c084fc);
            border: none;
            padding: 1rem 2.2rem;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.15rem;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            transition: 0.15s;
            color: #fef5e7;
            box-shadow: 0 6px 14px #7c3aed66;
        }
        .spin-gold:hover:not(:disabled) { transform: scale(1.02); }
        .spin-gold:disabled { opacity: 0.5; cursor: default; }

        /* result message */
        .result-area {
            background: rgba(12, 15, 26, 0.9);
            border-radius: 28px;
            padding: 1.2rem;
            margin: 1.5rem 0;
            text-align: center;
            font-weight: 600;
            font-size: 1.05rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .win-text {
            color: #a3e0a0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .lose-text {
            color: #ffa098;
        }

        /* paytable */
        .paytable-mini {
            background: rgba(16, 18, 31, 0.8);
            border-radius: 30px;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.75rem;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 8px;
            border: 1px solid rgba(79, 63, 110, 0.5);
        }
        .pay-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        @keyframes confettiBurst {
            0% { transform: translateY(0) rotate(0deg); opacity:1;}
            100% { transform: translateY(300px) rotate(720deg); opacity:0;}
        }
        @media (max-width: 700px) {
            .slot-mansion { padding: 1.2rem; }
            .slot-grid { gap: 12px; }
            .reel { font-size: 2.5rem; border: 1.5px solid #e5b83c; }
            .stat-number { font-size: 1.4rem; }
            .spin-gold { padding: 0.9rem 2rem; font-size: 1rem; }
            .jackpot-stats { flex-direction: column; gap: 0.8rem; }
        }
        @media (max-width: 480px) {
            .slot-mansion { padding: 1rem; }
            .slot-grid { gap: 10px; max-width: 320px; }
            .reel { font-size: 2rem; border: 1.5px solid #e5b83c; }
            .bet-chip-btn { padding: 0.5rem 0.8rem; font-size: 0.9rem; }
            .spin-gold { padding: 0.85rem 1.8rem; font-size: 0.95rem; }
            .stat-number { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<a href="../../mainpages/casino.html" class="home-btn">Casino</a>

<div class="slot-mansion">
    <div class="jackpot-stats">
        <div class="stat-block"><div class="stat-label">Balance</div><div class="stat-number" id="balanceValue">500</div></div>
        <div class="stat-block"><div class="stat-label">Bet</div><div class="stat-number" id="betValue">10</div></div>
        <div class="stat-block"><div class="stat-label">Last win</div><div class="stat-number" id="lastWinDisplay">0</div></div>
    </div>

    <div class="reels-area">
        <div class="slot-grid" id="reelsContainer">
            <div class="reel" data-pos="0-0">🪙</div>
            <div class="reel" data-pos="0-1">🪙</div>
            <div class="reel" data-pos="0-2">🪙</div>
            <div class="reel" data-pos="1-0">🪙</div>
            <div class="reel" data-pos="1-1">🪙</div>
            <div class="reel" data-pos="1-2">🪙</div>
            <div class="reel" data-pos="2-0">🪙</div>
            <div class="reel" data-pos="2-1">🪙</div>
            <div class="reel" data-pos="2-2">🪙</div>
        </div>
        <div class="bet-panel">
            <div class="bet-buttons" id="betSelector">
                <div class="bet-chip-btn active" data-bet="5">5</div>
                <div class="bet-chip-btn" data-bet="10">10</div>
                <div class="bet-chip-btn" data-bet="25">25</div>
                <div class="bet-chip-btn" data-bet="50">50</div>
                <div class="bet-chip-btn" data-bet="100">100</div>
            </div>
            <button class="spin-gold" id="spinBtn">Spin</button>
        </div>
        <div class="result-area" id="resultMsgArea">
            Ready to spin
        </div>
        <div class="paytable-mini" id="paytableList"></div>
    </div>
</div>

<script>
    const SYMBOLS = [
        { name: '🪙', payout: 5,   color: 'red' },
        { name: '🏅', payout: 8,   color: 'yellow' },
        { name: '🥇', payout: 10,  color: 'orange' },
        { name: '💎', payout: 12,  color: 'purple' },
        { name: '👑', payout: 20,  color: 'gold' },
        { name: '🏆', payout: 50,  color: 'cyan' },
        { name: '⭐', payout: 100, color: 'white' },
        { name: '7', payout: 200, color: 'rainbow' }
    ];

    let balance = 500;
    let currentBet = 10;
    let spinning = false;
    let lastWinAmount = 0;
    let gridState = Array(9).fill('A');  // 3x3 grid as flat array

    const balanceSpan = document.getElementById('balanceValue');
    const betSpan = document.getElementById('betValue');
    const lastWinSpan = document.getElementById('lastWinDisplay');
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('resultMsgArea');
    const reels = document.querySelectorAll('.reel');
    const betChips = document.querySelectorAll('.bet-chip-btn');
    const paytableDiv = document.getElementById('paytableList');

    function updateUI() {
        balanceSpan.innerText = Math.floor(balance);
        betSpan.innerText = currentBet;
        lastWinSpan.innerText = lastWinAmount;
        if (balance <= 0) {
            spinBtn.disabled = true;
            resultDiv.innerHTML = 'Game over. Refresh to restart.';
        } else {
            spinBtn.disabled = spinning;
        }
    }

    function buildPaytable() {
        paytableDiv.innerHTML = '';
        SYMBOLS.forEach(sym => {
            const div = document.createElement('div');
            div.className = 'pay-item';
            div.innerHTML = `<span>${sym.name} match</span><span style="color:gold;">$${sym.payout * currentBet}</span>`;
            paytableDiv.appendChild(div);
        });
    }

    function refreshPaytableMultiplier() {
        const items = paytableDiv.querySelectorAll('.pay-item');
        items.forEach((item, idx) => {
            if (idx < SYMBOLS.length) {
                const payoutAmount = SYMBOLS[idx].payout * currentBet;
                item.innerHTML = `<span>${SYMBOLS[idx].name} match</span><span style="color:gold;">$${payoutAmount}</span>`;
            }
        });
    }

    async function spinSlots() {
        if (spinning) return;
        if (balance < currentBet) {
            resultDiv.innerHTML = 'Insufficient balance. Change bet or restart.';
            resultDiv.classList.add('lose-text');
            setTimeout(() => resultDiv.classList.remove('lose-text'), 1200);
            return;
        }

        spinning = true;
        spinBtn.disabled = true;
        balance -= currentBet;
        updateUI();

        resultDiv.innerHTML = 'Spinning...';
        resultDiv.classList.remove('win-text', 'lose-text');
        
        reels.forEach(reel => reel.classList.add('spinning'));
        
        gridState = Array(9).fill(null).map(() => {
            const randIdx = Math.floor(Math.random() * SYMBOLS.length);
            return SYMBOLS[randIdx].name;
        });
        
        let rollSteps = 16;
        let step = 0;
        const rollInterval = setInterval(() => {
            reels.forEach((reel, idx) => {
                const randomSym = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].name;
                reel.innerText = randomSym;
            });
            step++;
            if (step >= rollSteps) {
                clearInterval(rollInterval);
                reels.forEach((reel, idx) => {
                    reel.innerText = gridState[idx];
                });
                reels.forEach(reel => reel.classList.remove('spinning'));
                evaluateWin();
                spinning = false;
                spinBtn.disabled = false;
                updateUI();
            }
        }, 70);
    }

    function evaluateWin() {
        let winAmount = 0;
        let winLines = [];
        const grid = gridState;

        for (let row = 0; row < 3; row++) {
            const start = row * 3;
            if (grid[start] === grid[start+1] && grid[start+1] === grid[start+2]) {
                const found = SYMBOLS.find(s => s.name === grid[start]);
                if (found) {
                    winAmount += found.payout * currentBet;
                    winLines.push([start, start+1, start+2]);
                }
            }
        }

        for (let col = 0; col < 3; col++) {
            if (grid[col] === grid[col+3] && grid[col+3] === grid[col+6]) {
                const found = SYMBOLS.find(s => s.name === grid[col]);
                if (found) {
                    winAmount += found.payout * currentBet;
                    winLines.push([col, col+3, col+6]);
                }
            }
        }

        if (grid[0] === grid[4] && grid[4] === grid[8]) {
            const found = SYMBOLS.find(s => s.name === grid[0]);
            if (found) {
                winAmount += found.payout * currentBet;
                winLines.push([0, 4, 8]);
            }
        }
        if (grid[2] === grid[4] && grid[4] === grid[6]) {
            const found = SYMBOLS.find(s => s.name === grid[2]);
            if (found) {
                winAmount += found.payout * currentBet;
                winLines.push([2, 4, 6]);
            }
        }
        
        if (winAmount > 0) {
            balance += winAmount;
            lastWinAmount = winAmount;
            updateUI();
            const lineCount = winLines.length;
            resultDiv.innerHTML = `Win! ${lineCount} line(s): +$${winAmount}`;
            resultDiv.classList.add('win-text');
            const winningIndices = new Set(winLines.flat());
            reels.forEach((reel, idx) => {
                if (winningIndices.has(idx)) {
                    reel.classList.add('win-highlight');
                    setTimeout(() => reel.classList.remove('win-highlight'), 900);
                }
            });
            createConfettiEffect();
            playWinEffect();
        } else {
            resultDiv.innerHTML = `No match. Lost $${currentBet}.`;
            resultDiv.classList.add('lose-text');
            setTimeout(() => resultDiv.classList.remove('lose-text'), 1500);
        }
        lastWinSpan.innerText = lastWinAmount;
        if (balance <= 0) updateUI();
        
        setTimeout(() => {
            if (!spinning && resultDiv.innerHTML !== 'Spinning...') {
                resultDiv.innerHTML = 'Ready to spin';
                resultDiv.classList.remove('win-text', 'lose-text');
            }
        }, 2800);
    }
    
    function createConfettiEffect() {
        for (let i=0; i<60; i++) {
            const conf = document.createElement('div');
            conf.style.position = 'fixed';
            conf.style.width = `${6+Math.random()*8}px`;
            conf.style.height = `${6+Math.random()*8}px`;
            conf.style.backgroundColor = `hsl(${Math.random()*360}, 75%, 55%)`;
            conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            conf.style.left = `${Math.random() * window.innerWidth}px`;
            conf.style.top = '-20px';
            conf.style.pointerEvents = 'none';
            conf.style.zIndex = 9999;
            document.body.appendChild(conf);
            const duration = 1200 + Math.random() * 800;
            const velocityX = (Math.random() - 0.5) * 6;
            conf.animate([
                { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
                { transform: `translate(${velocityX * 20}px, ${window.innerHeight+40}px) rotate(${Math.random()*720}deg)`, opacity: 0 }
            ], { duration: duration, easing: 'cubic-bezier(0.3,0.9,0.4,1)' }).onfinish = () => conf.remove();
        }
    }

    function playWinEffect() {
        if (!window.AudioContext && !window.webkitAudioContext) return;
        try {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(700, ctx.currentTime);
            osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
            osc.frequency.setValueAtTime(1600, ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
            setTimeout(() => ctx.close(), 600);
        } catch(e) {}
    }
    
    function setBet(amount) {
        if (spinning) return;
        if (balance > 0 && balance < amount && amount > balance) return;
        currentBet = amount;
        betSpan.innerText = currentBet;
        betChips.forEach(btn => {
            const val = parseInt(btn.dataset.bet);
            if (val === amount) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        refreshPaytableMultiplier();
    }
    
    function resetBankruptcy() {
        if (balance <= 0) {
            balance = 500;
            currentBet = 10;
            lastWinAmount = 0;
            spinning = false;
            updateUI();
            setBet(10);
            resultDiv.innerHTML = 'Game reset. Balance: 500';
            spinBtn.disabled = false;
        }
    }

    function tryReset() {
        if (balance <= 0) resetBankruptcy();
        else {
            resultDiv.innerHTML = 'Balance OK';
        }
        updateUI();
    }
    
    document.addEventListener('keydown', (e) => {
        if (spinning) return;
        if (e.code === 'Space' || e.key === 'Enter') {
            e.preventDefault();
            spinSlots();
        }
        if (e.code === 'Digit1') setBet(5);
        if (e.code === 'Digit2') setBet(10);
        if (e.code === 'Digit3') setBet(25);
        if (e.code === 'Digit4') setBet(50);
        if (e.code === 'Digit5') setBet(100);
        if (e.code === 'KeyR') tryReset();
    });
    
    function init() {
        buildPaytable();
        setBet(10);
        updateUI();
        spinBtn.addEventListener('click', spinSlots);
        betChips.forEach(chip => {
            chip.addEventListener('click', () => {
                if (spinning) return;
                const betVal = parseInt(chip.dataset.bet);
                setBet(betVal);
            });
        });
        if (balance <= 0) resetBankruptcy();
    }
    
    init();
</script>
</body>
</html>
