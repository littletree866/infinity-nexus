<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Machine - Professional Edition</title>
    <link rel="icon" type="image/x-icon" href="../../icon.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Trebuchet MS:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent-gold: #FFD700;
            --accent-silver: #C0C0C0;
            --accent-red: #ff2b2b;
            --accent-green: #00ff88;
            --accent-cyan: #00c6ff;
            --machine-glow: rgba(255, 215, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Trebuchet MS', serif;
            background: var(--primary-gradient);
            color: #fff;
            text-align: center;
            min-height: 100vh;
            padding: 20px;
            user-select: none;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        .header {
            margin-bottom: 20px;
            padding: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(to right, var(--accent-gold), var(--accent-silver));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #aaa;
            letter-spacing: 1px;
        }

        .game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 200px);
        }

        #machine {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(48, 43, 99, 0.3));
            border: 4px solid var(--accent-gold);
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 60px var(--machine-glow), inset 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        #machine::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-silver), var(--accent-gold));
        }

        /* Balance Display */
        .balance-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 1.3rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .balance-item {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid var(--accent-gold);
            border-radius: 12px;
            padding: 15px;
            box-shadow: inset 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .balance-label {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .balance-value {
            font-size: 1.6rem;
            color: var(--accent-gold);
            font-weight: 700;
        }

        /* Bet Selector */
        .bet-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 30px 0;
        }

        .betBtn {
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-family: 'Orbitron', serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .betBtn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-cyan);
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 198, 255, 0.4);
        }

        .betBtn.active {
            background: linear-gradient(135deg, var(--accent-cyan), #0072ff);
            border-color: var(--accent-gold);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
            transform: scale(1.08);
        }

        .betBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Slot Grid */
        #grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
            padding: 25px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.08), rgba(192, 192, 192, 0.04));
            border-radius: 20px;
            border: 3px solid var(--accent-gold);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.25), inset 0 0 25px rgba(255, 215, 0, 0.1);
        }

        .cell {
            aspect-ratio: 1;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.3), rgba(48, 43, 99, 0.2));
            border: 3px solid var(--accent-gold);
            border-radius: 15px;
            font-size: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 25px rgba(255, 215, 0, 0.25), 0 0 15px rgba(255, 215, 0, 0.2);
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
            min-height: 110px;
        }

        .cell::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
            opacity: 0;
        }

        .cell.spinning {
            animation: spinning-cell 0.3s ease-in-out;
        }

        @keyframes spinning-cell {
            0%, 100% { transform: scale(1) rotateZ(0deg); }
            50% { transform: scale(0.95) rotateZ(5deg); }
        }

        .cell.pulse {
            animation: winning-pulse 0.6s ease-out;
        }

        @keyframes winning-pulse {
            0% {
                transform: scale(1);
                box-shadow: inset 0 0 25px rgba(255, 215, 0, 0.25), 0 0 15px rgba(255, 215, 0, 0.2);
            }
            50% {
                transform: scale(1.12);
                box-shadow: inset 0 0 35px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.6);
            }
            100% {
                transform: scale(1);
                box-shadow: inset 0 0 25px rgba(255, 215, 0, 0.25), 0 0 15px rgba(255, 215, 0, 0.2);
            }
        }

        /* Spin Button */
        #spin {
            padding: 20px 50px;
            font-size: 1.3rem;
            font-weight: 700;
            font-family: 'Orbitron', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 3px solid var(--accent-gold);
            border-radius: 15px;
            background: linear-gradient(135deg, var(--accent-gold), #FFA500);
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
            margin: 20px 0;
            width: 100%;
            max-width: 300px;
        }

        #spin:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.6);
        }

        #spin:active:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
        }

        #spin:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Message Display */
        #message {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 25px 0;
            min-height: 40px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
            font-family: 'Orbitron', serif;
        }

        #message.win-message {
            background: rgba(0, 255, 136, 0.2);
            border-color: var(--accent-green);
            color: var(--accent-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            animation: win-flash 0.5s ease;
        }

        @keyframes win-flash {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        #message.lose-message {
            background: rgba(255, 43, 43, 0.2);
            border-color: var(--accent-red);
            color: var(--accent-red);
            box-shadow: 0 0 15px rgba(255, 43, 43, 0.3);
            animation: lose-shake 0.4s ease;
        }

        @keyframes lose-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Paytable */
        .paytable {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 215, 0, 0.08);
            border: 2px dashed var(--accent-gold);
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .paytable h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--accent-gold);
            font-family: 'Orbitron', serif;
            letter-spacing: 1px;
        }

        #paytable-content {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            text-align: left;
        }

        .payout-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 8px;
            border-left: 3px solid var(--accent-cyan);
            font-size: 0.85rem;
        }

        .payout-symbol {
            font-size: 1.2rem;
            margin-right: 8px;
            font-weight: 700;
        }

        /* Back Button */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid var(--accent-gold);
            border-radius: 8px;
            color: var(--accent-gold);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 1000;
            font-family: 'Trebuchet MS', serif;
        }

        .back-button:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: translateX(-5px);
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            #machine {
                padding: 25px;
            }

            .bet-selector {
                grid-template-columns: repeat(2, 1fr);
            }

            .cell {
                font-size: 2.5rem;
                min-height: 80px;
            }

            #spin {
                padding: 15px 30px;
                font-size: 1.1rem;
            }

            .balance-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back-button">← Back</a>

    <div class="header">
        <h1>🎰 SLOT MACHINE 🎰</h1>
        <p class="subtitle">Professional Gaming Experience</p>
    </div>

    <div class="game-container">
        <div id="machine">
            <div class="balance-container">
                <div class="balance-item">
                    <div class="balance-label">💰 Balance</div>
                    <div class="balance-value"><span id="coins">100</span></div>
                </div>
                <div class="balance-item">
                    <div class="balance-label">🎲 Current Bet</div>
                    <div class="balance-value">$<span id="betDisplay">1</span></div>
                </div>
            </div>

            <div class="bet-selector">
                <button class="betBtn active" data-bet="1">Bet $1</button>
                <button class="betBtn" data-bet="2">Bet $2</button>
                <button class="betBtn" data-bet="5">Bet $5</button>
                <button class="betBtn" data-bet="10">Bet $10</button>
            </div>

            <div class="grid" id="grid">
                <div class="cell">🍒</div>
                <div class="cell">🍇</div>
                <div class="cell">🍊</div>
                <div class="cell">🍋</div>
                <div class="cell">🍌</div>
                <div class="cell">⭐</div>
                <div class="cell">💎</div>
                <div class="cell">7️⃣</div>
                <div class="cell">🎯</div>
            </div>

            <div style="text-align: center;">
                <button id="spin">SPIN!</button>
            </div>

            <div id="message">👇 Select your bet and click SPIN! 👇</div>

            <div class="paytable">
                <h3>💰 PAYTABLE</h3>
                <div id="paytable-content"></div>
            </div>
        </div>
    </div>

    <script>
        // Game Constants
        const symbols = [
            { symbol: '🍒', payout: 5 },
            { symbol: '🍇', payout: 8 },
            { symbol: '🍊', payout: 10 },
            { symbol: '🍋', payout: 12 },
            { symbol: '🍌', payout: 15 },
            { symbol: '⭐', payout: 20 },
            { symbol: '💎', payout: 50 },
            { symbol: '7️⃣', payout: 100 },
            { symbol: '🎯', payout: 200 }
        ];

        // Game State
        let coins = parseInt(localStorage.getItem('slots-balance')) || 100;
        let bet = 1;
        let isSpinning = false;

        // DOM Elements
        const coinsDisplay = document.getElementById('coins');
        const betDisplay = document.getElementById('betDisplay');
        const spinButton = document.getElementById('spin');
        const message = document.getElementById('message');
        const cells = document.querySelectorAll('.cell');
        const betButtons = document.querySelectorAll('.betBtn');
        const paytableContent = document.getElementById('paytable-content');

        // Initialize
        function init() {
            coinsDisplay.textContent = coins;
            createPaytable();
            loadBalance();
        }

        function createPaytable() {
            paytableContent.innerHTML = '';
            symbols.forEach(({ symbol, payout }) => {
                const item = document.createElement('div');
                item.className = 'payout-item';
                item.innerHTML = `<span class="payout-symbol">${symbol}</span> x3 = $${payout}`;
                paytableContent.appendChild(item);
            });
        }

        // Bet Selection
        betButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isSpinning) return;

                bet = parseInt(btn.dataset.bet);
                betDisplay.textContent = bet;

                betButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                updateMessage(`Bet set to $${bet}`);
            });
        });

        // Main Spin Function
        spinButton.addEventListener('click', () => {
            if (isSpinning) return;

            if (coins < bet) {
                updateMessage('❌ Not enough coins!');
                return;
            }

            coins -= bet;
            coinsDisplay.textContent = coins;
            saveBalance();
            spin();
        });

        function spin() {
            isSpinning = true;
            spinButton.disabled = true;
            updateMessage('🎡 SPINNING...');

            const spinResults = [];
            let spinCount = 0;
            const maxSpins = 15;

            const spinInterval = setInterval(() => {
                cells.forEach((cell, index) => {
                    const randomSymbol = symbols[Math.floor(Math.random() * symbols.length)].symbol;
                    cell.textContent = randomSymbol;
                    cell.classList.add('spinning');
                });
                spinCount++;

                if (spinCount >= maxSpins) {
                    clearInterval(spinInterval);
                    cells.forEach(cell => cell.classList.remove('spinning'));
                    finalizeSpin();
                }
            }, 80);
        }

        function finalizeSpin() {
            const results = [];
            cells.forEach(cell => {
                const symbol = cell.textContent;
                results.push(symbol);
            });

            checkWin(results);
        }

        function checkWin(results) {
            let totalWin = 0;
            let winningLines = [];

            // Define win lines
            const winLines = [
                [0, 1, 2], // top
                [3, 4, 5], // middle
                [6, 7, 8], // bottom
                [0, 3, 6], // left
                [1, 4, 7], // center
                [2, 5, 8], // right
                [0, 4, 8], // diagonal
                [2, 4, 6]  // diagonal
            ];

            // Check for matches
            for (const line of winLines) {
                const [a, b, c] = line;
                if (results[a] === results[b] && results[b] === results[c]) {
                    const payout = symbols.find(s => s.symbol === results[a]).payout;
                    totalWin += payout * bet;
                    winningLines.push(line);
                }
            }

            if (totalWin > 0) {
                handleWin(totalWin, winningLines);
            } else {
                handleLoss();
            }
        }

        function handleWin(winAmount, winningLines) {
            coins += winAmount;
            coinsDisplay.textContent = coins;
            saveBalance();

            // Animate winning cells
            winningLines.forEach(line => {
                line.forEach(i => {
                    cells[i].classList.add('pulse');
                });
            });

            updateMessage(`🎉 JACKPOT! 🎉 You won $${winAmount}!`);
            message.classList.add('win-message');

            createCelebration();

            setTimeout(finishSpin, 2000);
        }

        function handleLoss() {
            updateMessage('No match this time... Try again!');
            message.classList.add('lose-message');

            // Shake animation
            const grid = document.getElementById('grid');
            grid.style.animation = 'none';
            setTimeout(() => {
                grid.style.animation = 'lose-shake 0.4s ease';
            }, 10);

            setTimeout(finishSpin, 1500);
        }

        function createCelebration() {
            const colors = ['#FFD700', '#00ff88', '#ff2b2b', '#00c6ff'];
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'fixed';
                particle.style.width = '12px';
                particle.style.height = '12px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.borderRadius = '50%';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '9999';

                const startX = window.innerWidth / 2;
                const startY = window.innerHeight / 2;
                particle.style.left = startX + 'px';
                particle.style.top = startY + 'px';

                document.body.appendChild(particle);

                const angle = (Math.PI * 2 * i) / 30;
                const velocity = 5 + Math.random() * 5;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;

                let x = startX, y = startY;
                let life = 1;

                const animate = setInterval(() => {
                    x += vx;
                    y += vy;
                    vy += 0.15;
                    life -= 0.02;

                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.opacity = life;

                    if (life <= 0) {
                        clearInterval(animate);
                        particle.remove();
                    }
                }, 30);
            }
        }

        function finishSpin() {
            isSpinning = false;
            spinButton.disabled = false;

            // Remove animations
            cells.forEach(cell => cell.classList.remove('pulse'));
            message.classList.remove('win-message', 'lose-message');

            // Game Over check
            if (coins < 1) {
                updateMessage('💥 GAME OVER! Out of coins!');
                spinButton.disabled = true;
                setTimeout(() => {
                    if (confirm('Game Over! Reset balance to 100?')) {
                        resetGame();
                    }
                }, 500);
            }
        }

        function updateMessage(text) {
            message.textContent = text;
        }

        function resetGame() {
            coins = 100;
            coinsDisplay.textContent = coins;
            saveBalance();
            spinButton.disabled = false;
            updateMessage('👇 Select your bet and click SPIN! 👇');
            message.classList.remove('win-message', 'lose-message');
        }

        function saveBalance() {
            localStorage.setItem('slots-balance', coins);
        }

        function loadBalance() {
            const saved = localStorage.getItem('slots-balance');
            if (saved) {
                coins = parseInt(saved);
                coinsDisplay.textContent = coins;
            }
        }

        // Start game
        init();
    </script>
</body>

</html>
