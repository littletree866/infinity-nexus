<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clicker Quest</title>
    <link rel="icon" href="../../icon.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">  

    <style>
        :root {
            --royal-purple: #7c3aed;
            --royal-gold: #f5b042;
            --emerald: #10b981;
            --crimson: #ef4444;
            --dark-bg: #0f0c1e;
            --card-bg: #1a162e;
            --text-light: #f3f0ff;
            --shadow-xl: 0 25px 45px rgba(0,0,0,0.5);
            --glow-purple: 0 0 20px rgba(124, 58, 237, 0.6);
            --cyan: #06b6d4;
            --lime: #84cc16;
        }

        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }


        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #1a1435, #070412);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
            pointer-events: none;
            animation: gradientShift 15s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* ===== HOME SCREEN ===== */
        .home-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, #0e0a1f, #03010a);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            transition: all 0.4s ease;
        }

        .hero-card {
            background: linear-gradient(145deg, #1e1935, #110d26);
            border-radius: 56px;
            padding: clamp(1rem, 2.5vw, 2rem) clamp(1rem, 4vw, 2rem) clamp(1rem, 3.5vw, 2.5rem);
            max-width: min(520px, 95vw);
            width: 100%;
            text-align: center;
            border: 2px solid rgba(245, 176, 66, 0.6);
            box-shadow: var(--shadow-xl), 0 0 40px rgba(245, 176, 66, 0.2);
            animation: fadeSlideUp 0.6s cubic-bezier(0.2,0.9,0.4,1.1);
            position: relative;
            overflow: hidden;
        }

        .hero-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(245, 176, 66, 0.1), transparent);
            animation: orbRotate 20s linear infinite;
        }

        @keyframes orbRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-icon {
            font-size: clamp(3rem, 6vw, 4.5rem);
            color: #ffd966;
            text-shadow: 0 4px 18px rgba(245,176,66,0.25);
        }

        .hero-title {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 800;
            color: #fff3d6;
            text-shadow: 0 6px 18px rgba(0,0,0,0.6);
            margin: 0.5rem 0;
            letter-spacing: 0.6px;
        }

        .feature-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 1.5rem 0;
            text-align: left;
        }

        .feature-badge {
            background: rgba(255,255,255,0.04);
            padding: 10px 12px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #efeaf8;
        }

        .launch-btn {
            background: linear-gradient(95deg, #f5b042, #c084fc);
            border: none;
            padding: 1rem 2rem;
            width: 100%;
            border-radius: 80px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #0a0618;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(192, 132, 252, 0.3);
        }

        .launch-btn:active { transform: scale(0.97); }

        /* ===== GAME CONTAINER ===== */
        .game-container {
            max-width: min(620px, 96vw);
            width: 100%;
            background: rgba(26, 22, 46, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: clamp(0.8rem, 2.8vw, 1.5rem);
            border: 2px solid rgba(245, 176, 66, 0.5);
            box-shadow: var(--shadow-xl), 0 0 40px rgba(124, 58, 237, 0.15);
            transition: 0.2s;
            position: relative;
            overflow: hidden;
        }

        .game-container::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: none;
            pointer-events: none;
            z-index: -1;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(245, 176, 66, 0.3);
        }

        .game-title {
            font-size: clamp(1rem, 2.8vw, 1.5rem);
            font-weight: 800;
            color: #fff7df;
            text-shadow: 0 6px 14px rgba(0,0,0,0.6);
        }

        .home-icon-btn {
            background: rgba(124, 58, 237, 0.2);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 60px;
            font-size: 1.4rem;
            cursor: pointer;
            color: #f5b042;
        }

        /* stats panel */
        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            background: linear-gradient(135deg, rgba(15, 12, 28, 0.8), rgba(20, 16, 40, 0.6));
            border-radius: 32px;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid rgba(132, 204, 22, 0.2);
            backdrop-filter: blur(4px);
        }

        .stat-card {
            flex: 1 1 120px;
            background: linear-gradient(180deg, #191425, #141022);
            border-radius: 18px;
            padding: 0.8rem 0.9rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(132, 204, 22, 0.5), transparent);
            opacity: 0;
            animation: statGlow 2s infinite;
        }

        @keyframes statGlow {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .stat-card:hover {
            border-color: rgba(132, 204, 22, 0.4);
            background: linear-gradient(180deg, rgba(25, 20, 37, 0.8), rgba(20, 13, 34, 0.6));
        }

        .stat-value {
            font-size: clamp(1rem, 3.2vw, 1.5rem);
            font-weight: 800;
            font-family: monospace;
            color: #fff;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #e6def8;
        }

        /* Click button */
        .click-core {
            width: 100%;
            background: linear-gradient(145deg, #8b5cf6, #5b21b6);
            border: none;
            padding: clamp(0.9rem, 2.8vw, 1.6rem);
            border-radius: 80px;
            font-size: clamp(1rem, 4vw, 1.8rem);
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            transition: transform 0.07s linear, box-shadow 0.07s linear;
            margin: 1rem 0;
            box-shadow: 0 12px 0 rgba(76,29,149,0.9), 0 0 30px rgba(139, 92, 246, 0.3);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .click-core::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .click-core:hover::before {
            left: 100%;
        }

        .click-core:active {
            transform: translateY(5px);
            box-shadow: 0 6px 0 #4c1d95, 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .boost-active {
            animation: pulseGold 0.6s infinite alternate;
            background: linear-gradient(145deg, #f59e0b, #d97706);
            box-shadow: 0 12px 0 #b45309, 0 0 8px gold, 0 0 30px rgba(245, 158, 11, 0.6);
        }

        @keyframes pulseGold {
            from { box-shadow: 0 12px 0 #b45309, 0 0 8px gold; }
            to { box-shadow: 0 12px 0 #b45309, 0 0 28px #ffd966; }
        }

        /* Upgrades grid */
        .upgrades-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 1.2rem 0;
        }

        .upgrade-row {
            background: linear-gradient(180deg, #120e24, #0f0b1a);
            border-radius: 18px;
            padding: 0.75rem 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-left: 4px solid #f5b042;
            border: 1px solid rgba(255,255,255,0.02);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .upgrade-row::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(132, 204, 22, 0.08), transparent);
            transition: left 0.5s;
        }

        .upgrade-row:hover::before {
            left: 100%;
        }

        .upgrade-row:hover {
            border-color: rgba(255,255,255,0.08);
            background: linear-gradient(180deg, #1a1230, #130d22);
        }

        .upgrade-info {
            flex: 2;
        }

        .upgrade-name {
            font-weight: 700;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .key-hint {
            background: #2a2345;
            padding: 3px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .upgrade-stats {
            font-size: 0.7rem;
            color: #bfb7f0;
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }

        .upgrade-btn {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border: none;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            color: #f5e6b2;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .upgrade-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            box-shadow: 0 6px 16px rgba(124, 58, 237, 0.5);
            transform: translateY(-2px);
        }

        .upgrade-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .upgrade-btn:disabled { 
            opacity: 0.35; 
            cursor: default; 
        }

        /* Prestige */
        .prestige-area {
            background: linear-gradient(135deg, #251e3b, #18122e);
            border-radius: 28px;
            padding: 1rem;
            margin-top: 1rem;
            border: 2px solid rgba(132, 204, 22, 0.4);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .prestige-area::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(132, 204, 22, 0.05), transparent);
            animation: orbRotate 25s linear infinite;
        }

        .prestige-area > * {
            position: relative;
            z-index: 1;
        }

        .prestige-btn {
            background: linear-gradient(135deg, #84cc16, #65a30d);
            border: none;
            padding: 0.9rem;
            width: 100%;
            border-radius: 60px;
            font-weight: 800;
            color: #1a1a1a;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 16px rgba(132, 204, 22, 0.3);
        }

        .prestige-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #a3e635, #84cc16);
            box-shadow: 0 8px 20px rgba(132, 204, 22, 0.5);
            transform: translateY(-2px);
        }

        .prestige-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .prestige-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        /* floating notif */
        .floating-number {
            position: fixed;
            font-weight: 800;
            pointer-events: none;
            z-index: 2000;
            font-size: 1.2rem;
            animation: floatRise 1s ease-out forwards;
            text-shadow: 0 2px 6px black;
        }

        @keyframes floatRise {
            0% { opacity: 1; transform: translateY(0) scale(0.9); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            transition: 0.25s;
            z-index: 3000;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .toast-msg.show { transform: translateX(-50%) translateY(0); }
        .toast-msg.error { background: #ef4444; }

        .bonus-orb {
            position: fixed;
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #fbbf24, #eab308);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px gold;
            animation: orbFloat 7s linear forwards;
            z-index: 500;
        }
        @keyframes orbFloat {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-300px) rotate(360deg); opacity: 0; }
        }

        /* Energy/Stamina bar */
        .energy-bar {
            margin: 0.8rem 0;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
            border: 1px solid rgba(6, 182, 212, 0.3);
        }

        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #06b6d4, #0891b2);
            border-radius: 20px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.6);
        }

        .energy-label {
            font-size: 0.7rem;
            color: #06b6d4;
            font-weight: 600;
            margin-bottom: 3px;
        }

        /* Combo counter */
        .combo-display {
            text-align: center;
            font-size: 1rem;
            font-weight: 700;
            color: #84cc16;
            min-height: 24px;
            text-shadow: 0 0 10px rgba(132, 204, 22, 0.5);
            margin: 0.5rem 0;
        }

        .combo-pulse {
            animation: comboPulse 0.3s ease;
        }

        @keyframes comboPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Achievement popup */
        .achievement-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #84cc16, #65a30d);
            border-radius: 12px;
            padding: 16px 20px;
            color: #1a1a1a;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(132, 204, 22, 0.4);
            animation: slideInRight 0.5s ease, slideOutRight 0.5s ease 2.5s forwards;
            z-index: 2500;
            max-width: 280px;
        }

        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(400px); opacity: 0; }
        }

        /* Progress bars for upgrades */
        .upgrade-progress {
            height: 4px;
            background: rgba(0,0,0,0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }

        .upgrade-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c084fc, #8b5cf6);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Event notification */
        .event-banner {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 20px;
            padding: 12px 16px;
            margin: 1rem 0;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            color: white;
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Upgrade slot availability */
        .upgrade-slots {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin: 0.5rem 0;
            font-size: 0.8rem;
        }

        .slot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(132, 204, 22, 0.2);
            border: 2px solid #84cc16;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: 600;
            color: #84cc16;
        }

        .slot.active {
            background: #84cc16;
            color: #1a1a1a;
        }

        /* Level up animation */
        .level-up {
            animation: levelUpBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes levelUpBounce {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Shimmer effect */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }

        /* Better stat cards */
        .stat-card {
            flex: 1 1 120px;
            background: linear-gradient(180deg, #191425, #141022);
            border-radius: 18px;
            padding: 0.8rem 0.9rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
            overflow: hidden;
        }

        .stat-card.boosted {
            border: 2px solid #84cc16;
            background: linear-gradient(180deg, rgba(132, 204, 22, 0.1), rgba(132, 204, 22, 0.05));
        }

        /* Daily bonus label */
        .daily-bonus {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ef4444;
            color: white;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 700;
        }

        @media (max-width: 550px) {
            .game-container { padding: 1rem; }
            .upgrade-row { flex-direction: column; align-items: stretch; }
            .upgrade-btn { align-self: flex-end; }
            .stat-value { font-size: 1.1rem; }
            .achievement-popup { right: 10px; left: 10px; max-width: none; }
        }
    </style>

</head>
<body>

<!-- HOME SCREEN -->
<div class="home-overlay" id="homeScreen">
    <div class="hero-card">
        <div class="hero-icon"><i class="fas fa-crown"></i></div>
        <div class="hero-title">Clicker Quest</div>
        <div class="feature-list">
            <div class="feature-badge"><i class="fas fa-bolt"></i> Strategic upgrades</div>
            <div class="feature-badge"><i class="fas fa-robot"></i> Passive income</div>
            <div class="feature-badge"><i class="fas fa-percentage"></i> Multiplier bonuses</div>
            <div class="feature-badge"><i class="fas fa-star"></i> Prestige system</div>
            <div class="feature-badge"><i class="fas fa-chart-line"></i> Progress tracking</div>
            <div class="feature-badge"><i class="fas fa-play"></i> Keyboard shortcuts</div>
        </div>
        <div style="display:flex;gap:10px;margin-top:0.5rem;">
            <button class="launch-btn" id="startGameBtn"><i class="fas fa-play"></i> Start</button>
            <a class="home-icon-btn" id="backToSiteBtn" href="../../index.html" title="Back to site" style="display:flex;align-items:center;justify-content:center;text-decoration:none;">
              <i class="fas fa-home"></i></a>
        </div>
    </div>
</div>

<!-- MAIN GAME -->
<div class="game-container" id="gameContainer" style="display: none;">
    <div class="game-header">
        <div class="game-title">Clicker Quest</div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="home-icon-btn" id="backHomeBtn" title="Back to home"><i class="fas fa-home"></i></button>
            <a class="home-icon-btn" href="../../index.html" title="Back to site" style="display:flex;align-items:center;justify-content:center;text-decoration:none;">←</a>
        </div>
    </div>

    <div class="stats-panel">
        <div class="stat-card"><div class="stat-value" id="moneyDisplay">0</div><div class="stat-label">Gold</div></div>
        <div class="stat-card"><div class="stat-value" id="incomeDisplay">0</div><div class="stat-label">/sec</div></div>
        <div class="stat-card"><div class="stat-value" id="multiplierDisplay">1.0x</div><div class="stat-label">Mult.</div></div>
        <div class="stat-card"><div class="stat-value" id="clickCountDisplay">0</div><div class="stat-label">Clicks</div></div>
    </div>

    <div id="eventBanner"></div>

    <div class="energy-label">Energy</div>
    <div class="energy-bar">
        <div class="energy-fill" id="energyBar" style="width: 100%"></div>
    </div>

    <div class="combo-display" id="comboDisplay"></div>

    <button class="click-core" id="mainClickBtn">Click</button>

    <div class="upgrades-grid" id="upgradesList"></div>

    <div class="prestige-area">
        <div>Prestige</div>
        <div style="font-size:0.75rem;">Reset progress for permanent +15% boost</div>
        <div>Current bonus: <span id="prestigeBonusSpan">0</span>%</div>
        <button class="prestige-btn" id="prestigeActionBtn">Prestige ($10k)</button>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // ---------- GAME STATE ----------
    let gold = 0;
    let clickPower = 1;
    let passiveIncome = 0;
    let clickUpgradeLevel = 0;
    let autoUpgradeLevel = 0;
    let critUpgradeLevel = 0;
    let magnetUpgradeLevel = 0;
    let ascensionCount = 0;
    let totalClicks = 0;

    let clickCost = 12;
    let autoCost = 28;
    let critCost = 1200;
    let magnetCost = 700;

    let boostActive = false;
    let boostTimer = null;
    let boostTimeLeft = 0;

    let critChanceBase = 8;
    let critDamage = 5;

    // NEW: Energy system
    let maxEnergy = 100;
    let currentEnergy = 100;
    let energyRegenRate = 0.5; // per second
    let energyCost = 1;

    // NEW: Combo system
    let comboCount = 0;
    let lastClickTime = 0;
    let comboTimeout = 3000; // 3 seconds to maintain combo
    
    // NEW: Achievements
    let achievements = {};
    const achievementsList = {
        'first_100': { name: 'Golden Start', desc: 'Earn 100 gold', reward: 50 },
        'first_1k': { name: 'Rising Star', desc: 'Earn 1,000 gold', reward: 200 },
        'first_10k': { name: 'Wealth', desc: 'Earn 10,000 gold', reward: 500 },
        'first_100k': { name: 'Fortune', desc: 'Earn 100,000 gold', reward: 1000 },
        'first_upgrade': { name: 'Growth', desc: 'Buy your first upgrade', reward: 25 },
        'prestige_first': { name: 'Rebirth', desc: 'Prestige for the first time', reward: 100 },
        'combo_10': { name: 'On a Roll', desc: 'Reach 10x combo', reward: 75 },
        'crit_hit': { name: 'Precision', desc: 'Land a critical hit', reward: 30 },
    };

    // NEW: Daily bonus
    let lastDailyBonusDate = localStorage.getItem('daily_bonus_date') || '';
    let dailyBonusActive = false;

    // NEW: Random events
    let eventActive = false;
    let eventType = '';
    
    // helper multipliers
    function getGlobalMult() {
        let mult = 1 + (ascensionCount * 0.15) + (magnetUpgradeLevel * 0.15);
        if (boostActive) mult *= 3;
        if (eventActive && eventType === 'double') mult *= 2;
        return mult;
    }

    function getCritChance() { return critChanceBase + (critUpgradeLevel * 4); }
    function getCritDamage() { return critDamage + (critUpgradeLevel * 1.2); }

    // format numbers
    function formatMoney(val) {
        if (val >= 1e9) return (val/1e9).toFixed(2).replace(/\.00$/,'') + 'B';
        if (val >= 1e6) return (val/1e6).toFixed(2).replace(/\.00$/,'') + 'M';
        if (val >= 1e3) return (val/1e3).toFixed(2).replace(/\.00$/,'') + 'K';
        return Math.floor(val).toString();
    }

    function updateUI() {
        const mult = getGlobalMult();
        const displayMoney = formatMoney(gold);
        document.getElementById('moneyDisplay').innerHTML = displayMoney;
        document.getElementById('incomeDisplay').innerHTML = formatMoney(passiveIncome * mult) + '/s';
        document.getElementById('multiplierDisplay').innerHTML = mult.toFixed(2) + 'x';
        document.getElementById('clickCountDisplay').innerHTML = formatMoney(totalClicks);
        document.getElementById('prestigeBonusSpan').innerHTML = ascensionCount * 15;
        
        // Update energy bar
        const energyPercent = (currentEnergy / maxEnergy) * 100;
        document.getElementById('energyBar').style.width = energyPercent + '%';

        // Update combo display
        const comboDiv = document.getElementById('comboDisplay');
        if (comboCount > 1) {
            comboDiv.textContent = `${comboCount}x COMBO!`;
        } else {
            comboDiv.textContent = '';
        }
        
        // upgrade buttons rendering dynamically
        const upgradesDiv = document.getElementById('upgradesList');
        upgradesDiv.innerHTML = `
            <div class="upgrade-row">
                <div class="upgrade-info"><div class="upgrade-name"><span class="key-hint">1</span> Strike Power</div><div class="upgrade-stats">+50% per click | Lv.${clickUpgradeLevel} | +${(clickPower * getGlobalMult()).toFixed(1)}/click</div><div class="upgrade-progress"><div class="upgrade-progress-fill" style="width: ${Math.min(100, (gold/clickCost)*100)}%"></div></div></div>
                <button class="upgrade-btn" id="buyClickUpg" ${gold < clickCost ? 'disabled' : ''}>$${formatMoney(clickCost)}</button>
            </div>
            <div class="upgrade-row">
                <div class="upgrade-info"><div class="upgrade-name"><span class="key-hint">2</span> Passive Income</div><div class="upgrade-stats">+1.5/sec | Lv.${autoUpgradeLevel} | +${(passiveIncome * getGlobalMult()).toFixed(1)}/s</div><div class="upgrade-progress"><div class="upgrade-progress-fill" style="width: ${Math.min(100, (gold/autoCost)*100)}%"></div></div></div>
                <button class="upgrade-btn" id="buyAutoUpg" ${gold < autoCost ? 'disabled' : ''}>$${formatMoney(autoCost)}</button>
            </div>
            <div class="upgrade-row">
                <div class="upgrade-info"><div class="upgrade-name"><span class="key-hint">3</span> Critical Hit</div><div class="upgrade-stats">Crit ${getCritChance()}% | x${getCritDamage().toFixed(1)} multiplier | Lv.${critUpgradeLevel}</div><div class="upgrade-progress"><div class="upgrade-progress-fill" style="width: ${Math.min(100, (gold/critCost)*100)}%"></div></div></div>
                <button class="upgrade-btn" id="buyCritUpg" ${gold < critCost ? 'disabled' : ''}>$${formatMoney(critCost)}</button>
            </div>
            <div class="upgrade-row">
                <div class="upgrade-info"><div class="upgrade-name"><span class="key-hint">4</span> Global Boost</div><div class="upgrade-stats">+15% all earnings | Lv.${magnetUpgradeLevel} | Total +${Math.floor(magnetUpgradeLevel * 15)}%</div><div class="upgrade-progress"><div class="upgrade-progress-fill" style="width: ${Math.min(100, (gold/magnetCost)*100)}%"></div></div></div>
                <button class="upgrade-btn" id="buyMagnetUpg" ${gold < magnetCost ? 'disabled' : ''}>$${formatMoney(magnetCost)}</button>
            </div>
            <div class="upgrade-row">
                <div class="upgrade-info"><div class="upgrade-name"><span class="key-hint">5</span> Speed Boost</div><div class="upgrade-stats">3x earnings for 45s ${boostActive ? `(${Math.floor(boostTimeLeft)}s remaining)` : 'Ready'}</div></div>
                <button class="upgrade-btn" id="buyBoostUpg" ${gold < 600 || boostActive ? 'disabled' : ''}>$600</button>
            </div>
        `;
        
        const boostBtn = document.getElementById('buyBoostUpg');
        if (boostActive) {
            document.getElementById('mainClickBtn').classList.add('boost-active');
        } else {
            document.getElementById('mainClickBtn').classList.remove('boost-active');
        }
        
        // prestige button state
        const prestigeBtn = document.getElementById('prestigeActionBtn');
        prestigeBtn.disabled = gold < 10000;
        
        // attach events after re-render
        document.getElementById('buyClickUpg')?.addEventListener('click', () => buyUpgrade('click'));
        document.getElementById('buyAutoUpg')?.addEventListener('click', () => buyUpgrade('auto'));
        document.getElementById('buyCritUpg')?.addEventListener('click', () => buyUpgrade('crit'));
        document.getElementById('buyMagnetUpg')?.addEventListener('click', () => buyUpgrade('magnet'));
        document.getElementById('buyBoostUpg')?.addEventListener('click', () => activateBoost());
    }

    function showToast(msg, isErr = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.classList.remove('error');
        if (isErr) toast.classList.add('error');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function showAchievement(achvKey) {
        if (achievements[achvKey]) return; // already unlocked
        achievements[achvKey] = true;
        const achv = achievementsList[achvKey];
        if (!achv) return;

        // Show popup
        const popup = document.createElement('div');
        popup.className = 'achievement-popup';
        popup.innerHTML = `🏆 ${achv.name}<br><span style="font-size: 0.85rem; opacity: 0.9;">+${achv.reward} gold</span>`;
        document.body.appendChild(popup);
        gold += achv.reward;
        setTimeout(() => popup.remove(), 3000);
        saveGame();
    }

    function addFloatingNumber(value, x, y, isCrit = false) {
        const floatDiv = document.createElement('div');
        floatDiv.className = 'floating-number';
        floatDiv.textContent = `+${formatMoney(value)}`;
        floatDiv.style.left = x + 'px';
        floatDiv.style.top = y + 'px';
        floatDiv.style.color = isCrit ? '#ffd966' : '#b9f5b0';
        floatDiv.style.fontWeight = '800';
        document.body.appendChild(floatDiv);
        setTimeout(() => floatDiv.remove(), 950);
    }

    function triggerConfetti(x, y) {
        for (let i=0;i<12;i++) {
            const particle = document.createElement('div');
            particle.style.position = 'fixed';
            particle.style.width = '7px';
            particle.style.height = '7px';
            particle.style.background = `hsl(${Math.random()*360}, 80%, 65%)`;
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.pointerEvents = 'none';
            particle.style.zIndex = '9999';
            document.body.appendChild(particle);
            let vx = (Math.random() - 0.5) * 6;
            let vy = (Math.random() - 0.5) * 6 - 4;
            let life = 1;
            const animatePart = () => {
                vx *= 0.97;
                vy += 0.2;
                x += vx; y += vy;
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                life -= 0.025;
                particle.style.opacity = life;
                if (life > 0) requestAnimationFrame(animatePart);
                else particle.remove();
            };
            requestAnimationFrame(animatePart);
        }
    }

    // click handler
    function handleClick(e) {
        // Energy check
        if (currentEnergy < energyCost) {
            showToast('No energy left', true);
            return;
        }

        currentEnergy -= energyCost;

        // Combo system
        const now = Date.now();
        if (now - lastClickTime > comboTimeout) {
            comboCount = 0;
        }
        comboCount++;
        lastClickTime = now;

        // Bonus multiplier for combo
        let comboMult = 1 + (comboCount * 0.05);

        let value = clickPower * getGlobalMult() * comboMult;
        const isCrit = Math.random() * 100 < getCritChance();
        if (isCrit) {
            value *= getCritDamage();
            showToast(`Critical hit! x${getCritDamage().toFixed(1)}`, false);
            const btnRect = document.getElementById('mainClickBtn').getBoundingClientRect();
            triggerConfetti(btnRect.left + btnRect.width/2, btnRect.top + btnRect.height/2);
            showAchievement('crit_hit');
        }

        if (comboCount >= 10) {
            showAchievement('combo_10');
        }

        gold += value;
        totalClicks++;

        // Milestone achievements
        if (gold >= 100 && gold - value < 100) showAchievement('first_100');
        if (gold >= 1000 && gold - value < 1000) showAchievement('first_1k');
        if (gold >= 10000 && gold - value < 10000) showAchievement('first_10k');
        if (gold >= 100000 && gold - value < 100000) showAchievement('first_100k');

        let clientX = e.clientX, clientY = e.clientY;
        if (!clientX || !clientY) {
            const rect = document.getElementById('mainClickBtn').getBoundingClientRect();
            clientX = rect.left + rect.width/2;
            clientY = rect.top + rect.height/2;
        }
        addFloatingNumber(value, clientX, clientY-30, isCrit);
        updateUI();
        playTapEffect();
    }

    function playTapEffect() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.08;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
        osc.stop(audioCtx.currentTime + 0.2);
        setTimeout(() => audioCtx.close(), 250);
    }

    function buyUpgrade(type) {
        let upgraded = false;
        if (type === 'click' && gold >= clickCost) {
            gold -= clickCost;
            clickPower = Math.floor(clickPower * 1.5);
            clickUpgradeLevel++;
            clickCost = Math.floor(clickCost * 1.25);
            showToast('Strike power upgraded');
            upgraded = true;
        } else if (type === 'auto' && gold >= autoCost) {
            gold -= autoCost;
            passiveIncome += 1.5;
            autoUpgradeLevel++;
            autoCost = Math.floor(autoCost * 1.3);
            showToast('Passive income increased');
            upgraded = true;
        } else if (type === 'crit' && gold >= critCost) {
            gold -= critCost;
            critUpgradeLevel++;
            critCost = Math.floor(critCost * 1.4);
            showToast(`Critical rate: ${getCritChance()}%`);
            upgraded = true;
        } else if (type === 'magnet' && gold >= magnetCost) {
            gold -= magnetCost;
            magnetUpgradeLevel++;
            magnetCost = Math.floor(magnetCost * 1.35);
            showToast('Global boost +15%');
            upgraded = true;
        }
        if (upgraded) {
            showAchievement('first_upgrade');
        }
        updateUI();
        saveGame();
    }

    function activateBoost() {
        if (boostActive) return;
        if (gold < 600) { showToast('Insufficient funds', true); return; }
        gold -= 600;
        boostActive = true;
        boostTimeLeft = 45;
        if (boostTimer) clearInterval(boostTimer);
        boostTimer = setInterval(() => {
            boostTimeLeft--;
            updateUI();
            if (boostTimeLeft <= 0) {
                clearInterval(boostTimer);
                boostActive = false;
                showToast('Boost expired');
                updateUI();
            }
        }, 1000);
        showToast('Speed boost active: 3x for 45s');
        updateUI();
        saveGame();
    }

    function ascension() {
        if (gold < 10000) { showToast('Need $10k to prestige', true); return; }
        ascensionCount++;
        gold = 0;
        clickPower = 1;
        passiveIncome = 0;
        clickUpgradeLevel = 0;
        autoUpgradeLevel = 0;
        critUpgradeLevel = 0;
        magnetUpgradeLevel = 0;
        clickCost = 12;
        autoCost = 28;
        critCost = 1200;
        magnetCost = 700;
        comboCount = 0;
        currentEnergy = maxEnergy;
        if (boostActive) { clearInterval(boostTimer); boostActive = false; }
        showAchievement('prestige_first');
        showToast(`Prestige unlocked: +${ascensionCount*15}% permanent bonus`);
        updateUI();
        saveGame();
    }

    // Energy regeneration
    let energyRegenInterval;
    function startEnergyRegen() {
        if (energyRegenInterval) clearInterval(energyRegenInterval);
        energyRegenInterval = setInterval(() => {
            if (currentEnergy < maxEnergy) {
                currentEnergy = Math.min(maxEnergy, currentEnergy + energyRegenRate);
                updateUI();
            }
        }, 100);
    }

    // passive income tick
    let passiveInterval;
    function startPassive() {
        if (passiveInterval) clearInterval(passiveInterval);
        passiveInterval = setInterval(() => {
            if (passiveIncome > 0) {
                const earn = passiveIncome * getGlobalMult();
                gold += earn;
                updateUI();
            }
        }, 1000);
    }

    // Trigger random events
    function triggerRandomEvent() {
        if (Math.random() < 0.3 && !eventActive) {
            eventActive = true;
            eventType = 'double';
            const banner = document.getElementById('eventBanner');
            banner.className = 'event-banner';
            banner.textContent = '⚡ Bonus Event: 2x earnings for 30 seconds!';
            
            setTimeout(() => {
                eventActive = false;
                banner.textContent = '';
                updateUI();
            }, 30000);
            updateUI();
        }
    }

    // bonus orb spawn
    function spawnOrb() {
        if (document.getElementById('gameContainer').style.display !== 'none') {
            const orb = document.createElement('div');
            orb.className = 'bonus-orb';
            orb.style.left = Math.random() * 80 + 10 + '%';
            orb.style.bottom = '20px';
            document.body.appendChild(orb);
            orb.addEventListener('click', (e) => {
                e.stopPropagation();
                const magnetBonus = 1 + (magnetUpgradeLevel * 0.15);
                let bonus = Math.floor((Math.random() * 400 + 150) * magnetBonus);
                gold += bonus;
                showToast(`Bonus earned: +${formatMoney(bonus)}`);
                const rect = orb.getBoundingClientRect();
                addFloatingNumber(bonus, rect.left + 20, rect.top - 20, false);
                orb.remove();
                updateUI();
                saveGame();
            });
            setTimeout(() => { if (orb.parentNode) orb.remove(); }, 6500);
        }
    }

    // Save / Load
    function saveGame() {
        const data = { 
            gold, clickPower, passiveIncome, clickUpgradeLevel, autoUpgradeLevel, 
            critUpgradeLevel, magnetUpgradeLevel, clickCost, autoCost, critCost, magnetCost, 
            ascensionCount, totalClicks, currentEnergy, achievements 
        };
        localStorage.setItem('clicker_odyssey_save', JSON.stringify(data));
    }

    function loadGame() {
        const raw = localStorage.getItem('clicker_odyssey_save');
        if (raw) {
            try {
                const d = JSON.parse(raw);
                gold = d.gold ?? 0;
                clickPower = d.clickPower ?? 1;
                passiveIncome = d.passiveIncome ?? 0;
                clickUpgradeLevel = d.clickUpgradeLevel ?? 0;
                autoUpgradeLevel = d.autoUpgradeLevel ?? 0;
                critUpgradeLevel = d.critUpgradeLevel ?? 0;
                magnetUpgradeLevel = d.magnetUpgradeLevel ?? 0;
                clickCost = d.clickCost ?? 12;
                autoCost = d.autoCost ?? 28;
                critCost = d.critCost ?? 1200;
                magnetCost = d.magnetCost ?? 700;
                ascensionCount = d.ascensionCount ?? 0;
                totalClicks = d.totalClicks ?? 0;
                currentEnergy = d.currentEnergy ?? maxEnergy;
                achievements = d.achievements ?? {};
            } catch(e) {}
        }

        // Daily bonus check
        const today = new Date().toDateString();
        if (lastDailyBonusDate !== today) {
            dailyBonusActive = true;
            gold += 100;
            lastDailyBonusDate = today;
            showToast('Daily bonus: +100 gold!');
            showAchievement('daily_bonus');
            localStorage.setItem('daily_bonus_date', today);
        }

        updateUI();
    }

    // keyboard
    function onKey(e) {
        if (document.getElementById('gameContainer').style.display === 'none') return;
        const key = e.key;
        if (key === ' ' || key === 'Space') {
            e.preventDefault();
            const fakeEvent = { clientX: window.innerWidth/2, clientY: window.innerHeight/2 };
            handleClick(fakeEvent);
        }
        if (key === '1') document.getElementById('buyClickUpg')?.click();
        if (key === '2') document.getElementById('buyAutoUpg')?.click();
        if (key === '3') document.getElementById('buyCritUpg')?.click();
        if (key === '4') document.getElementById('buyMagnetUpg')?.click();
        if (key === '5') document.getElementById('buyBoostUpg')?.click();
    }

    // Home/Screen toggles
    const homeDiv = document.getElementById('homeScreen');
    const gameDiv = document.getElementById('gameContainer');
    document.getElementById('startGameBtn').onclick = () => { homeDiv.style.display = 'none'; gameDiv.style.display = 'block'; loadGame(); startPassive(); startEnergyRegen(); setInterval(() => spawnOrb(), 12000); setInterval(() => triggerRandomEvent(), 60000); };
    document.getElementById('backHomeBtn').onclick = () => { saveGame(); gameDiv.style.display = 'none'; homeDiv.style.display = 'flex'; };
    document.getElementById('prestigeActionBtn').onclick = ascension;
    document.getElementById('mainClickBtn').onclick = handleClick;
    
    document.addEventListener('keydown', onKey);
    loadGame();
    startPassive();
    startEnergyRegen();
    setInterval(() => { if (gameDiv.style.display !== 'none') saveGame(); }, 15000);
</script>
</body>
</html>
