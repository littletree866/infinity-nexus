<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clicker Quest</title>
    <link rel="icon" href="../../icon.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">  

    <style>
        :root {
            --royal-purple: #7c3aed;
            --royal-gold: #f5b042;
            --emerald: #10b981;
            --crimson: #ef4444;
            --dark-bg: #0f0c1e;
            --card-bg: #1a162e;
            --text-light: #f3f0ff;
            --shadow-xl: 0 25px 45px rgba(0,0,0,0.5);
            --glow-purple: 0 0 20px rgba(124, 58, 237, 0.6);
        }

        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }


        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #1a1435, #070412);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* ===== HOME SCREEN ===== */
        .home-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, #0e0a1f, #03010a);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            transition: all 0.4s ease;
        }

        .hero-card {
            background: linear-gradient(145deg, #1e1935, #110d26);
            border-radius: 56px;
            padding: clamp(1rem, 2.5vw, 2rem) clamp(1rem, 4vw, 2rem) clamp(1rem, 3.5vw, 2.5rem);
            max-width: min(520px, 95vw);
            width: 100%;
            text-align: center;
            border: 1px solid rgba(245, 176, 66, 0.4);
            box-shadow: var(--shadow-xl);
            animation: fadeSlideUp 0.6s cubic-bezier(0.2,0.9,0.4,1.1);
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-icon {
            font-size: clamp(3rem, 6vw, 4.5rem);
            color: #ffd966;
            text-shadow: 0 4px 18px rgba(245,176,66,0.25);
        }

        .hero-title {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 800;
            color: #fff3d6;
            text-shadow: 0 6px 18px rgba(0,0,0,0.6);
            margin: 0.5rem 0;
            letter-spacing: 0.6px;
        }

        .feature-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 1.5rem 0;
            text-align: left;
        }

        .feature-badge {
            background: rgba(255,255,255,0.04);
            padding: 10px 12px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #efeaf8;
        }

        .launch-btn {
            background: linear-gradient(95deg, #f5b042, #c084fc);
            border: none;
            padding: 1rem 2rem;
            width: 100%;
            border-radius: 80px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #0a0618;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(192, 132, 252, 0.3);
        }

        .launch-btn:active { transform: scale(0.97); }

        /* ===== GAME CONTAINER ===== */
        .game-container {
            max-width: min(620px, 96vw);
            width: 100%;
            background: rgba(26, 22, 46, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: clamp(0.8rem, 2.8vw, 1.5rem);
            border: 1px solid rgba(245, 176, 66, 0.4);
            box-shadow: var(--shadow-xl);
            transition: 0.2s;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(245, 176, 66, 0.3);
        }

        .game-title {
            font-size: clamp(1rem, 2.8vw, 1.5rem);
            font-weight: 800;
            color: #fff7df;
            text-shadow: 0 6px 14px rgba(0,0,0,0.6);
        }

        .home-icon-btn {
            background: rgba(124, 58, 237, 0.2);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 60px;
            font-size: 1.4rem;
            cursor: pointer;
            color: #f5b042;
        }

        /* stats panel */
        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            background: #0f0c1ccc;
            border-radius: 32px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .stat-card {
            flex: 1 1 120px;
            background: linear-gradient(180deg, #191425, #141022);
            border-radius: 18px;
            padding: 0.8rem 0.9rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .stat-value {
            font-size: clamp(1rem, 3.2vw, 1.5rem);
            font-weight: 800;
            font-family: monospace;
            color: #fff;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #e6def8;
        }

        /* Click button */
        .click-core {
            width: 100%;
            background: linear-gradient(145deg, #8b5cf6, #5b21b6);
            border: none;
            padding: clamp(0.9rem, 2.8vw, 1.6rem);
            border-radius: 80px;
            font-size: clamp(1rem, 4vw, 1.8rem);
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            transition: transform 0.07s linear, box-shadow 0.07s linear;
            margin: 1rem 0;
            box-shadow: 0 12px 0 rgba(76,29,149,0.9);
            font-family: inherit;
        }

        .click-core:active {
            transform: translateY(5px);
            box-shadow: 0 6px 0 #4c1d95;
        }

        .boost-active {
            animation: pulseGold 0.6s infinite alternate;
            background: linear-gradient(145deg, #f59e0b, #d97706);
        }

        @keyframes pulseGold {
            from { box-shadow: 0 12px 0 #b45309, 0 0 8px gold; }
            to { box-shadow: 0 12px 0 #b45309, 0 0 28px #ffd966; }
        }

        /* Upgrades grid */
        .upgrades-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 1.2rem 0;
        }

        .upgrade-row {
            background: linear-gradient(180deg, #120e24, #0f0b1a);
            border-radius: 18px;
            padding: 0.75rem 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-left: 4px solid #f5b042;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .upgrade-info {
            flex: 2;
        }

        .upgrade-name {
            font-weight: 700;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .key-hint {
            background: #2a2345;
            padding: 3px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .upgrade-stats {
            font-size: 0.7rem;
            color: #bfb7f0;
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }

        .upgrade-btn {
            background: #2a234a;
            border: none;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            color: #f5e6b2;
        }

        .upgrade-btn:disabled { opacity: 0.4; cursor: default; }

        /* Prestige */
        .prestige-area {
            background: linear-gradient(135deg, #251e3b, #18122e);
            border-radius: 28px;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px dashed #f5b042;
            text-align: center;
        }

        .prestige-btn {
            background: #c2410c;
            border: none;
            padding: 0.8rem;
            width: 100%;
            border-radius: 60px;
            font-weight: 800;
            color: white;
            margin-top: 10px;
            cursor: pointer;
        }

        /* floating notif */
        .floating-number {
            position: fixed;
            font-weight: 800;
            pointer-events: none;
            z-index: 2000;
            font-size: 1.2rem;
            animation: floatRise 1s ease-out forwards;
            text-shadow: 0 2px 6px black;
        }

        @keyframes floatRise {
            0% { opacity: 1; transform: translateY(0) scale(0.9); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            transition: 0.25s;
            z-index: 3000;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .toast-msg.show { transform: translateX(-50%) translateY(0); }
        .toast-msg.error { background: #ef4444; }

        .bonus-orb {
            position: fixed;
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #fbbf24, #eab308);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px gold;
            animation: orbFloat 7s linear forwards;
            z-index: 500;
        }
        @keyframes orbFloat {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-300px) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 550px) {
            .game-container { padding: 1rem; }
            .upgrade-row { flex-direction: column; align-items: stretch; }
            .upgrade-btn { align-self: flex-end; }
            .stat-value { font-size: 1.1rem; }
        }
    </style>

</head>
<body>

<!-- HOME SCREEN -->
<div class="home-overlay" id="homeScreen">
    <div class="hero-card">
        <div class="hero-icon"><i class="fas fa-crown"></i></div>
        <div class="hero-title">Clicker Quest</div>
        <div class="feature-list">
            <div class="feature-badge"><i class="fas fa-bolt"></i> Epic click power</div>
            <div class="feature-badge"><i class="fas fa-robot"></i> Auto generators</div>
            <div class="feature-badge"><i class="fas fa-bomb"></i> Critical strikes</div>
            <div class="feature-badge"><i class="fas fa-gem"></i> Ascension system</div>
            <div class="feature-badge"><i class="fas fa-chart-line"></i> Global multiplier</div>
            <div class="feature-badge"><i class="fas fa-gamepad"></i> Keyboard 1-5</div>
        </div>
        <div style="display:flex;gap:10px;margin-top:0.5rem;">
            <button class="launch-btn" id="startGameBtn"><i class="fas fa-play"></i> Start adventure</button>
            <a class="home-icon-btn" id="backToSiteBtn" href="../../index.html" title="Back to site" style="display:flex;align-items:center;justify-content:center;text-decoration:none;">
              <i class="fas fa-home"></i></a>
        </div>
    </div>
</div>

<!-- MAIN GAME -->
<div class="game-container" id="gameContainer" style="display: none;">
    <div class="game-header">
        <div class="game-title"><i class="fas fa-dice-d6"></i> Clicker Quest</div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="home-icon-btn" id="backHomeBtn" title="Back to home"><i class="fas fa-home"></i></button>
            <a class="home-icon-btn" href="../../index.html" title="Back to site" style="display:flex;align-items:center;justify-content:center;text-decoration:none;">←</a>
        </div>
    </div>

    <div class="stats-panel">
        <div class="stat-card"><div class="stat-value" id="moneyDisplay">0</div><div class="stat-label">Money</div></div>
        <div class="stat-card"><div class="stat-value" id="incomeDisplay">0</div><div class="stat-label">Per sec</div></div>
        <div class="stat-card"><div class="stat-value" id="multiplierDisplay">1.0x</div><div class="stat-label">Multiplier</div></div>
        <div class="stat-card"><div class="stat-value" id="clickCountDisplay">0</div><div class="stat-label">Clicks</div></div>
    </div>

    <button class="click-core" id="mainClickBtn"><i class="fas fa-fist-raised"></i> Click Me</button>

    <div class="upgrades-grid" id="upgradesList"></div>

    <div class="prestige-area">
        <div><i class="fas fa-star-of-life"></i> Ascension</div>
        <div style="font-size:0.75rem;">Permanent +15% per ascension (requires $10,000)</div>
        <div>Bonus: <span id="prestigeBonusSpan">0</span>%</div>
        <button class="prestige-btn" id="prestigeActionBtn">Ascend</button>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // ---------- GAME STATE ----------
    let gold = 0;
    let clickPower = 1;
    let passiveIncome = 0;
    let clickUpgradeLevel = 0;
    let autoUpgradeLevel = 0;
    let critUpgradeLevel = 0;
    let magnetUpgradeLevel = 0;
    let ascensionCount = 0;
    let totalClicks = 0;

    let clickCost = 12;
    let autoCost = 28;
    let critCost = 1200;
    let magnetCost = 700;

    let boostActive = false;
    let boostTimer = null;
    let boostTimeLeft = 0;

    let critChanceBase = 8;
    let critDamage = 5;
    
    // helper multipliers
    function getGlobalMult() {
        let mult = 1 + (ascensionCount * 0.15) + (magnetUpgradeLevel * 0.15);
        if (boostActive) mult *= 3;
        return mult;
    }

    function getCritChance() { return critChanceBase + (critUpgradeLevel * 4); }
    function getCritDamage() { return critDamage + (critUpgradeLevel * 1.2); }

    // format numbers
    function formatMoney(val) {
        if (val >= 1e9) return (val/1e9).toFixed(2).replace(/\.00$/,'') + 'B';
        if (val >= 1e6) return (val/1e6).toFixed(2).replace(/\.00$/,'') + 'M';
        if (val >= 1e3) return (val/1e3).toFixed(2).replace(/\.00$/,'') + 'K';
        return Math.floor(val).toString();
    }

    function updateUI() {
        const mult = getGlobalMult();
        const displayMoney = formatMoney(gold);
        document.getElementById('moneyDisplay').innerHTML = displayMoney;
        document.getElementById('incomeDisplay').innerHTML = formatMoney(passiveIncome * mult) + '/s';
        document.getElementById('multiplierDisplay').innerHTML = mult.toFixed(2) + 'x';
        document.getElementById('clickCountDisplay').innerHTML = formatMoney(totalClicks);
        document.getElementById('prestigeBonusSpan').innerHTML = ascensionCount * 15;
        
        // upgrade buttons rendering dynamically
        const upgradesDiv = document.getElementById('upgradesList');
        upgradesDiv.innerHTML = `
            <div class="upgrade-row">
                <div class="upgrade-info"><div class="upgrade-name"><span class="key-hint">1</span> ⚔️ Mighty Strike</div><div class="upgrade-stats">+50% click power | Lv.${clickUpgradeLevel} | +${(clickPower * getGlobalMult()).toFixed(1)}/click</div></div>
                <button class="upgrade-btn" id="buyClickUpg" ${gold < clickCost ? 'disabled' : ''}>Buy $${formatMoney(clickCost)}</button>
            </div>
            <div class="upgrade-row">
                <div class="upgrade-info"><div class="upgrade-name"><span class="key-hint">2</span> 🤖 Golden Engine</div><div class="upgrade-stats">+1.5 income/s | Lv.${autoUpgradeLevel} | +${(passiveIncome * getGlobalMult()).toFixed(1)}/s</div></div>
                <button class="upgrade-btn" id="buyAutoUpg" ${gold < autoCost ? 'disabled' : ''}>Buy $${formatMoney(autoCost)}</button>
            </div>
            <div class="upgrade-row">
                <div class="upgrade-info"><div class="upgrade-name"><span class="key-hint">3</span> 💥 Critical Mastery</div><div class="upgrade-stats">Crit ${getCritChance()}% | x${getCritDamage().toFixed(1)} dmg | Lv.${critUpgradeLevel}</div></div>
                <button class="upgrade-btn" id="buyCritUpg" ${gold < critCost ? 'disabled' : ''}>Buy $${formatMoney(critCost)}</button>
            </div>
            <div class="upgrade-row">
                <div class="upgrade-info"><div class="upgrade-name"><span class="key-hint">4</span> 🧲 Magnet Heart</div><div class="upgrade-stats">+15% global income | Lv.${magnetUpgradeLevel} | total bonus ${Math.floor(magnetUpgradeLevel * 15)}%</div></div>
                <button class="upgrade-btn" id="buyMagnetUpg" ${gold < magnetCost ? 'disabled' : ''}>Buy $${formatMoney(magnetCost)}</button>
            </div>
            <div class="upgrade-row">
                <div class="upgrade-info"><div class="upgrade-name"><span class="key-hint">5</span> ⚡ Mystic Surge</div><div class="upgrade-stats">3x earnings for 45s ${boostActive ? `(ACTIVE ${Math.floor(boostTimeLeft)}s)` : 'Ready'}</div></div>
                <button class="upgrade-btn" id="buyBoostUpg" ${gold < 600 || boostActive ? 'disabled' : ''}>Buy $600</button>
            </div>
        `;
        
        const boostBtn = document.getElementById('buyBoostUpg');
        if (boostActive) {
            document.getElementById('mainClickBtn').classList.add('boost-active');
        } else {
            document.getElementById('mainClickBtn').classList.remove('boost-active');
        }
        
        // prestige button state
        const prestigeBtn = document.getElementById('prestigeActionBtn');
        prestigeBtn.disabled = gold < 10000;
        
        // attach events after re-render
        document.getElementById('buyClickUpg')?.addEventListener('click', () => buyUpgrade('click'));
        document.getElementById('buyAutoUpg')?.addEventListener('click', () => buyUpgrade('auto'));
        document.getElementById('buyCritUpg')?.addEventListener('click', () => buyUpgrade('crit'));
        document.getElementById('buyMagnetUpg')?.addEventListener('click', () => buyUpgrade('magnet'));
        document.getElementById('buyBoostUpg')?.addEventListener('click', () => activateBoost());
    }

    function showToast(msg, isErr = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.classList.remove('error');
        if (isErr) toast.classList.add('error');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function addFloatingNumber(value, x, y, isCrit = false) {
        const floatDiv = document.createElement('div');
        floatDiv.className = 'floating-number';
        floatDiv.textContent = `+${formatMoney(value)}`;
        floatDiv.style.left = x + 'px';
        floatDiv.style.top = y + 'px';
        floatDiv.style.color = isCrit ? '#ffd966' : '#b9f5b0';
        floatDiv.style.fontWeight = '800';
        document.body.appendChild(floatDiv);
        setTimeout(() => floatDiv.remove(), 950);
    }

    function triggerConfetti(x, y) {
        for (let i=0;i<12;i++) {
            const particle = document.createElement('div');
            particle.style.position = 'fixed';
            particle.style.width = '7px';
            particle.style.height = '7px';
            particle.style.background = `hsl(${Math.random()*360}, 80%, 65%)`;
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.pointerEvents = 'none';
            particle.style.zIndex = '9999';
            document.body.appendChild(particle);
            let vx = (Math.random() - 0.5) * 6;
            let vy = (Math.random() - 0.5) * 6 - 4;
            let life = 1;
            const animatePart = () => {
                vx *= 0.97;
                vy += 0.2;
                x += vx; y += vy;
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                life -= 0.025;
                particle.style.opacity = life;
                if (life > 0) requestAnimationFrame(animatePart);
                else particle.remove();
            };
            requestAnimationFrame(animatePart);
        }
    }

    // click handler
    function handleClick(e) {
        let value = clickPower * getGlobalMult();
        const isCrit = Math.random() * 100 < getCritChance();
        if (isCrit) {
            value *= getCritDamage();
            showToast(`🔥 CRITICAL! x${getCritDamage().toFixed(1)}`, false);
            const btnRect = document.getElementById('mainClickBtn').getBoundingClientRect();
            triggerConfetti(btnRect.left + btnRect.width/2, btnRect.top + btnRect.height/2);
        }
        gold += value;
        totalClicks++;
        let clientX = e.clientX, clientY = e.clientY;
        if (!clientX || !clientY) {
            const rect = document.getElementById('mainClickBtn').getBoundingClientRect();
            clientX = rect.left + rect.width/2;
            clientY = rect.top + rect.height/2;
        }
        addFloatingNumber(value, clientX, clientY-30, isCrit);
        updateUI();
        playTapEffect();
    }

    function playTapEffect() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.08;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
        osc.stop(audioCtx.currentTime + 0.2);
        setTimeout(() => audioCtx.close(), 250);
    }

    function buyUpgrade(type) {
        if (type === 'click' && gold >= clickCost) {
            gold -= clickCost;
            clickPower = Math.floor(clickPower * 1.5);
            clickUpgradeLevel++;
            clickCost = Math.floor(clickCost * 1.25);
            showToast('⚔️ Click power increased!');
            updateUI();
        } else if (type === 'auto' && gold >= autoCost) {
            gold -= autoCost;
            passiveIncome += 1.5;
            autoUpgradeLevel++;
            autoCost = Math.floor(autoCost * 1.3);
            showToast('🤖 Auto generator upgraded!');
            updateUI();
        } else if (type === 'crit' && gold >= critCost) {
            gold -= critCost;
            critUpgradeLevel++;
            critCost = Math.floor(critCost * 1.4);
            showToast(`💥 Critical chance increased! (${getCritChance()}%)`);
            updateUI();
        } else if (type === 'magnet' && gold >= magnetCost) {
            gold -= magnetCost;
            magnetUpgradeLevel++;
            magnetCost = Math.floor(magnetCost * 1.35);
            showToast(`🧲 Global multiplier boosted! +15%`);
            updateUI();
        }
        saveGame();
    }

    function activateBoost() {
        if (boostActive) return;
        if (gold < 600) { showToast('Not enough gold for Surge!', true); return; }
        gold -= 600;
        boostActive = true;
        boostTimeLeft = 45;
        if (boostTimer) clearInterval(boostTimer);
        boostTimer = setInterval(() => {
            boostTimeLeft--;
            updateUI();
            if (boostTimeLeft <= 0) {
                clearInterval(boostTimer);
                boostActive = false;
                showToast('⚡ Surge faded...');
                updateUI();
            }
        }, 1000);
        showToast('⚡ SURGE ACTIVATED! 3x income for 45s!');
        updateUI();
        saveGame();
    }

    function ascension() {
        if (gold < 10000) { showToast('Need 10,000 gold to ascend!', true); return; }
        ascensionCount++;
        gold = 0;
        clickPower = 1;
        passiveIncome = 0;
        clickUpgradeLevel = 0;
        autoUpgradeLevel = 0;
        critUpgradeLevel = 0;
        magnetUpgradeLevel = 0;
        clickCost = 12;
        autoCost = 28;
        critCost = 1200;
        magnetCost = 700;
        if (boostActive) { clearInterval(boostTimer); boostActive = false; }
        showToast(`✨ ASCENDED! +${ascensionCount*15}% permanent bonus ✨`);
        updateUI();
        saveGame();
    }

    // passive income tick
    let passiveInterval;
    function startPassive() {
        if (passiveInterval) clearInterval(passiveInterval);
        passiveInterval = setInterval(() => {
            if (passiveIncome > 0) {
                const earn = passiveIncome * getGlobalMult();
                gold += earn;
                updateUI();
            }
        }, 1000);
    }

    // bonus orb spawn
    function spawnOrb() {
        if (document.getElementById('gameContainer').style.display !== 'none') {
            const orb = document.createElement('div');
            orb.className = 'bonus-orb';
            orb.style.left = Math.random() * 80 + 10 + '%';
            orb.style.bottom = '20px';
            document.body.appendChild(orb);
            orb.addEventListener('click', (e) => {
                e.stopPropagation();
                const magnetBonus = 1 + (magnetUpgradeLevel * 0.15);
                let bonus = Math.floor((Math.random() * 400 + 150) * magnetBonus);
                gold += bonus;
                showToast(`💰 BONUS! +${formatMoney(bonus)} gold`);
                const rect = orb.getBoundingClientRect();
                addFloatingNumber(bonus, rect.left + 20, rect.top - 20, false);
                orb.remove();
                updateUI();
                saveGame();
            });
            setTimeout(() => { if (orb.parentNode) orb.remove(); }, 6500);
        }
    }

    // Save / Load
    function saveGame() {
        const data = { gold, clickPower, passiveIncome, clickUpgradeLevel, autoUpgradeLevel, critUpgradeLevel, magnetUpgradeLevel, clickCost, autoCost, critCost, magnetCost, ascensionCount, totalClicks };
        localStorage.setItem('clicker_odyssey_save', JSON.stringify(data));
    }

    function loadGame() {
        const raw = localStorage.getItem('clicker_odyssey_save');
        if (raw) {
            try {
                const d = JSON.parse(raw);
                gold = d.gold ?? 0;
                clickPower = d.clickPower ?? 1;
                passiveIncome = d.passiveIncome ?? 0;
                clickUpgradeLevel = d.clickUpgradeLevel ?? 0;
                autoUpgradeLevel = d.autoUpgradeLevel ?? 0;
                critUpgradeLevel = d.critUpgradeLevel ?? 0;
                magnetUpgradeLevel = d.magnetUpgradeLevel ?? 0;
                clickCost = d.clickCost ?? 12;
                autoCost = d.autoCost ?? 28;
                critCost = d.critCost ?? 1200;
                magnetCost = d.magnetCost ?? 700;
                ascensionCount = d.ascensionCount ?? 0;
                totalClicks = d.totalClicks ?? 0;
            } catch(e) {}
        }
        updateUI();
    }

    // keyboard
    function onKey(e) {
        if (document.getElementById('gameContainer').style.display === 'none') return;
        const key = e.key;
        if (key === ' ' || key === 'Space') {
            e.preventDefault();
            const fakeEvent = { clientX: window.innerWidth/2, clientY: window.innerHeight/2 };
            handleClick(fakeEvent);
        }
        if (key === '1') document.getElementById('buyClickUpg')?.click();
        if (key === '2') document.getElementById('buyAutoUpg')?.click();
        if (key === '3') document.getElementById('buyCritUpg')?.click();
        if (key === '4') document.getElementById('buyMagnetUpg')?.click();
        if (key === '5') document.getElementById('buyBoostUpg')?.click();
    }

    // Home/Screen toggles
    const homeDiv = document.getElementById('homeScreen');
    const gameDiv = document.getElementById('gameContainer');
    document.getElementById('startGameBtn').onclick = () => { homeDiv.style.display = 'none'; gameDiv.style.display = 'block'; loadGame(); startPassive(); setInterval(() => spawnOrb(), 12000); };
    document.getElementById('backHomeBtn').onclick = () => { saveGame(); gameDiv.style.display = 'none'; homeDiv.style.display = 'flex'; };
    document.getElementById('prestigeActionBtn').onclick = ascension;
    document.getElementById('mainClickBtn').onclick = handleClick;
    
    document.addEventListener('keydown', onKey);
    loadGame();
    startPassive();
    setInterval(() => { if (gameDiv.style.display !== 'none') saveGame(); }, 15000);
</script>
</body>
</html>
