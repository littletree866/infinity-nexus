<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dig Deep</title>
  <link rel="icon" href="../../icon.jpg" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

  <style>

    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0e1a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Space Grotesk', sans-serif;
      color: #eaf0f9;
      padding: 12px;
    }
    .game-wrapper {
      max-width: 1200px;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      background: rgba(8, 14, 26, 0.7);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      padding: 24px;
      border: 1px solid rgba(0, 255, 200, 0.15);
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px #00ff8822;
    }
    .main-panel {
      flex: 2;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .title {
      font-weight: 900;
      font-size: 1.6rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #b0ffe0, #00ffb3);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px #00ff8840;
      margin: 0;
    }
    .hud-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px 16px;
      background: rgba(0, 20, 30, 0.5);
      backdrop-filter: blur(4px);
      padding: 14px 24px;
      border-radius: 60px;
      border: 1px solid #00ff8840;
      box-shadow: 0 0 30px #00ff8820;
      width: 100%;
      max-width: 500px;
    }
    .hud-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      justify-content: center;
      font-size: 0.95rem;
    }
    .hud-item .label {
      color: #8aaec9;
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    .hud-item .value {
      font-weight: 700;
      font-size: 1.3rem;
      color: #b0ffe0;
      min-width: 2.4rem;
      text-align: right;
    }
    .hud-item .value.gold {
      color: #ffd866;
    }
    .hud-item .value.health {
      color: #ff7b89;
    }
    .hud-item .value.energy {
      color: #7fc9ff;
    }
    .world-container {
      position: relative;
      width: 100%;
      max-width: 460px;
      aspect-ratio: 9 / 12;
      background: #03070f;
      border-radius: 32px;
      padding: 10px;
      border: 2px solid #1b3b3b;
      box-shadow: inset 0 0 30px #00000088, 0 10px 30px #000000aa;
    }
    #world {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      gap: 6px;
      width: 100%;
      height: 100%;
    }
    .tile {
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.7);
      text-shadow: 0 1px 4px #000000aa;
      transition: 0.1s ease;
      cursor: pointer;
      box-shadow: inset 0 -2px 0 #00000066, 0 2px 6px #00000077;
      background: #1a2a2a;
      background-size: cover;
      background-blend-mode: overlay;
      position: relative;
    }
    .tile:hover {
      transform: scale(1.04);
      z-index: 5;
      box-shadow: 0 0 16px #00ffaa60;
    }
    .tile:active {
      transform: scale(0.94);
    }
    /* block styles */
    .grass { background: linear-gradient(145deg, #4fbf4a, #1f7a1a); color: #d4ffc4; }
    .dirt { background: linear-gradient(145deg, #8b6f4b, #5d4329); color: #d6bd9a; }
    .stone { background: linear-gradient(145deg, #7a7f86, #3f454b); color: #cbd0d6; }
    .coal { background: linear-gradient(145deg, #2f2f2f, #0d0d0d); color: #b0b0b0; box-shadow: inset 0 0 12px #ff404050; }
    .iron { background: linear-gradient(145deg, #dba56e, #a8662e); color: #ffe5c4; box-shadow: 0 0 12px #ffa54b40; }
    .gold { background: linear-gradient(145deg, #f7e47a, #c29d2b); color: #fff7d0; box-shadow: 0 0 18px #ffd96680; }
    .diamond { background: linear-gradient(145deg, #a3ffff, #1fbfbf); color: #003333; box-shadow: 0 0 28px #00ffffbb; }
    .emerald { background: linear-gradient(145deg, #55ff88, #008844); color: #d0ffdd; box-shadow: 0 0 28px #33ff88bb; }
    .obsidian { background: linear-gradient(145deg, #4f4f8f, #1e1e3a); color: #c8c8ff; box-shadow: 0 0 28px #6f6fffaa; }
    .player {
      outline: 3px solid #80ffcc;
      outline-offset: -2px;
      box-shadow: 0 0 30px #80ffcc, inset 0 0 20px #80ffcc66;
      background: radial-gradient(circle at 30% 30%, #b0ffe0, #008866);
      color: #001a14;
      font-weight: 900;
      font-size: 0.8rem;
      text-shadow: 0 0 12px #b0ffe0;
    }
    .tile.empty {
      background: #0d1a1a;
      box-shadow: inset 0 0 0 1px #1f3a3a;
      cursor: default;
    }
    .tile.empty:hover {
      transform: none;
      box-shadow: inset 0 0 0 1px #1f3a3a;
    }

    .sidebar {
      flex: 1;
      min-width: 220px;
      background: rgba(6, 14, 24, 0.6);
      backdrop-filter: blur(6px);
      border-radius: 32px;
      padding: 20px 18px;
      border: 1px solid #00ff8840;
      box-shadow: inset 0 0 30px #00000044;
      max-height: 560px;
      overflow-y: auto;
    }
    .sidebar h3 {
      margin: 0 0 12px 0;
      color: #00f0c0;
      font-weight: 600;
      letter-spacing: 1px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .block-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    .block-table th {
      text-align: left;
      color: #8bb3d0;
      font-weight: 500;
      padding-bottom: 6px;
      border-bottom: 1px solid #2a4a4a;
    }
    .block-table td {
      padding: 6px 2px;
      border-bottom: 1px solid #1f3434;
    }
    .block-table .block-name {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .block-table .pts {
      text-align: right;
      font-weight: 600;
      color: #b0ffe0;
    }
    .block-table .prob {
      text-align: right;
      color: #b8d0e0;
      font-size: 0.75rem;
    }
    .legend {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #7aa0b0;
      line-height: 1.6;
      border-top: 1px solid #2a4a4a;
      padding-top: 14px;
    }
    .legend span {
      color: #c0e8ff;
      font-weight: 500;
    }
    .message-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a1f1f;
      padding: 12px 28px;
      border-radius: 60px;
      border: 1px solid #00ffaa;
      color: #b0ffe0;
      font-weight: 600;
      font-size: 1.2rem;
      box-shadow: 0 0 40px #00ff8840;
      backdrop-filter: blur(6px);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 999;
    }
    .message-toast.show {
      opacity: 1;
    }
    .energy-bar, .health-bar {
      width: 60px;
      height: 6px;
      background: #1f3340;
      border-radius: 20px;
      display: inline-block;
      margin-left: 4px;
      vertical-align: middle;
      overflow: hidden;
    }
    .energy-bar .fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #4fc3ff, #00e5ff);
      border-radius: 20px;
    }
    .health-bar .fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff6b7a, #ff3d56);
      border-radius: 20px;
    }
    @media (max-width: 700px) {
      .game-wrapper { padding: 12px; gap: 12px; }
      .hud-grid { grid-template-columns: repeat(2, 1fr); gap: 4px 8px; padding: 12px; }
    }
  </style>

</head>
<body>

<div class="game-wrapper">
  <div class="main-panel">
    <div class="title">Dig Deep</div>

    <div class="hud-grid" id="hudGrid">
      <div class="hud-item"><span class="label">⬇ depth</span><span class="value" id="depthDisplay">0</span></div>
      <div class="hud-item"><span class="label">⭐ score</span><span class="value gold" id="scoreDisplay">0</span></div>
      <div class="hud-item"><span class="label">🔥 combo</span><span class="value" id="comboDisplay" style="color:#ffb347;">0</span></div>
      <div class="hud-item"><span class="label">⚡ energy</span><span class="value energy" id="energyDisplay">100</span>
        <div class="energy-bar"><div class="fill" id="energyFill"></div></div>
      </div>
      <div class="hud-item"><span class="label">❤️ health</span><span class="value health" id="healthDisplay">100</span>
        <div class="health-bar"><div class="fill" id="healthFill"></div></div>
      </div>
      <div class="hud-item"><span class="label">🏆 streak</span><span class="value" style="color:#ffd966;" id="streakDisplay">0</span></div>
    </div>

    <div class="world-container">
      <div id="world"></div>
    </div>
  </div>

  <div class="sidebar">
    <h3>📊 block values</h3>
    <table class="block-table">
      <thead><tr><th>type</th><th>pts</th><th>%</th></tr></thead>
      <tbody id="blockStats">
        <tr><td><span class="block-name">🌱 grass</span></td><td class="pts">1</td><td class="prob" id="p_grass">—</td></tr>
        <tr><td><span class="block-name">🟫 dirt</span></td><td class="pts">1</td><td class="prob" id="p_dirt">—</td></tr>
        <tr><td><span class="block-name">🪨 stone</span></td><td class="pts">3</td><td class="prob" id="p_stone">—</td></tr>
        <tr><td><span class="block-name">⚫ coal</span></td><td class="pts">8</td><td class="prob" id="p_coal">—</td></tr>
        <tr><td><span class="block-name">🟨 iron</span></td><td class="pts">15</td><td class="prob" id="p_iron">—</td></tr>
        <tr><td><span class="block-name">💛 gold</span></td><td class="pts">30</td><td class="prob" id="p_gold">—</td></tr>
        <tr><td><span class="block-name">💎 diamond</span></td><td class="pts">80</td><td class="prob" id="p_diamond">—</td></tr>
        <tr><td><span class="block-name">🔷 emerald</span></td><td class="pts">120</td><td class="prob" id="p_emerald">—</td></tr>
        <tr><td><span class="block-name">⬛ obsidian</span></td><td class="pts">150</td><td class="prob" id="p_obsidian">—</td></tr>
      </tbody>
    </table>
    <div class="legend">
      <span>⚡</span> energy -5 per dig &nbsp;·&nbsp; <span>❤️</span> regen 1/5s<br>
      <span>📈</span> depth× (1 + depth/50) &nbsp;·&nbsp; <span>🔥</span> combo× (1 + combo*0.2)
    </div>
  </div>
</div>

<div id="messageToast" class="message-toast"></div>

<script>
  (function() {
    const W = 9, VIEW_H = 9;
    let depth = 0, score = 0, combo = 0, energy = 100, health = 100, maxHealth = 100, streak = 0;
    let playerX = 4, playerY = 0;
    let world = [];
    let gameActive = true;
    let lastHealTime = Date.now();
    let toastTimeout = null;

    const blocks = [
      { name: "Grass", cls: "grass", pts: 1 },
      { name: "Dirt", cls: "dirt", pts: 1 },
      { name: "Stone", cls: "stone", pts: 3 },
      { name: "Coal", cls: "coal", pts: 8 },
      { name: "Iron", cls: "iron", pts: 15 },
      { name: "Gold", cls: "gold", pts: 30 },
      { name: "Diamond", cls: "diamond", pts: 80 },
      { name: "Emerald", cls: "emerald", pts: 120 },
      { name: "Obsidian", cls: "obsidian", pts: 150 }
    ];
    const blockKeys = ['grass','dirt','stone','coal','iron','gold','diamond','emerald','obsidian'];

    function getWeights(d) {
      if (d < 3) return [70, 25, 5, 0, 0, 0, 0, 0, 0];
      if (d < 10) return [10, 40, 30, 10, 5, 3, 2, 0, 0];
      if (d < 30) return [0, 15, 30, 20, 15, 10, 7, 2, 1];
      if (d < 60) return [0, 0, 20, 20, 20, 15, 15, 7, 3];
      if (d < 100) return [0, 0, 10, 15, 20, 20, 15, 10, 10];
      return [0, 0, 5, 10, 15, 20, 20, 15, 15];
    }

    function genBlock(d) {
      const w = getWeights(d);
      const sum = w.reduce((a,b) => a+b, 0);
      if (sum === 0) return blocks[0];
      let r = Math.random() * sum;
      for (let i=0; i<w.length; i++) {
        r -= w[i];
        if (r <= 0) return blocks[i];
      }
      return blocks[blocks.length-1];
    }

    function addRow() {
      const d = world.length;
      const row = [];
      for (let i=0; i<W; i++) row.push(genBlock(d));
      world.push(row);
    }

    for (let i=0; i<20; i++) addRow();

    function applyGravity() {
      for (let x=0; x<W; x++) {
        for (let y=world.length-1; y>0; y--) {
          if (world[y][x] == null) {
            world[y][x] = world[y-1][x];
            world[y-1][x] = null;
          }
        }
      }
    }

    function showMessage(text, duration = 2000) {
      const toast = document.getElementById('messageToast');
      toast.textContent = text;
      toast.classList.add('show');
      if (toastTimeout) clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, duration);
    }

    function draw() {
      const container = document.getElementById('world');
      container.innerHTML = '';
      const startY = Math.max(0, playerY - 2);
      for (let y = startY; y < startY + VIEW_H; y++) {
        if (!world[y]) addRow();
        for (let x = 0; x < W; x++) {
          const tile = document.createElement('div');
          const block = world[y]?.[x];
          let cls = 'tile ';
          if (!block) {
            cls += 'empty';
          } else {
            cls += block.cls;
          }
          if (x === playerX && y === playerY) cls += ' player';
          tile.className = cls;
          if (x === playerX && y === playerY) tile.textContent = '⛏';
          else if (block) tile.textContent = '';
          tile.dataset.x = x;
          tile.dataset.y = y;
          tile.addEventListener('click', (e) => {
            const x = parseInt(e.currentTarget.dataset.x);
            const y = parseInt(e.currentTarget.dataset.y);
            mine(x, y);
          });
          container.appendChild(tile);
        }
      }

      // update HUD
      document.getElementById('depthDisplay').textContent = Math.floor(depth);
      document.getElementById('scoreDisplay').textContent = Math.floor(score);
      document.getElementById('comboDisplay').textContent = combo;
      document.getElementById('energyDisplay').textContent = Math.floor(energy);
      document.getElementById('healthDisplay').textContent = Math.floor(health);
      document.getElementById('streakDisplay').textContent = streak;

      const ef = document.getElementById('energyFill');
      ef.style.width = Math.max(0, Math.min(100, energy)) + '%';
      const hf = document.getElementById('healthFill');
      hf.style.width = Math.max(0, Math.min(100, (health/maxHealth)*100)) + '%';

      // update probabilities
      const w = getWeights(depth);
      const sum = w.reduce((a,b) => a+b, 0);
      const ids = ['p_grass','p_dirt','p_stone','p_coal','p_iron','p_gold','p_diamond','p_emerald','p_obsidian'];
      ids.forEach((id, i) => {
        const el = document.getElementById(id);
        if (el) el.textContent = sum > 0 ? Math.round((w[i]/sum)*100) + '%' : '0%';
      });
    }

    function mine(x, y) {
      if (!gameActive) return;
      const dx = Math.abs(x - playerX), dy = Math.abs(y - playerY);
      if (dx + dy !== 1) return;
      const block = world[y]?.[x];
      if (!block) return;

      // energy cost
      energy -= 5;
      if (energy < 0) {
        health += energy;  // energy deficit hurts health
        energy = 0;
        if (health < 0) health = 0;
      }

      const depthMul = 1 + (depth / 50);
      const comboMul = 1 + (combo * 0.2);
      const pts = Math.floor(block.pts * depthMul * comboMul);
      score += pts;

      // combo logic
      const isValuable = (block.name !== 'Grass' && block.name !== 'Dirt');
      if (isValuable) {
        combo++;
        streak++;
        if (combo === 5) showMessage('✨ combo x5', 1000);
        else if (combo === 10) showMessage('🔥 MEGA combo x10', 1400);
        else if (combo === 15) showMessage('⚡ LEGENDARY x15', 1600);
        else if (combo > 3 && combo % 3 === 0) showMessage(`⚡ combo x${combo}`, 900);
      } else {
        combo = 0;
        streak = 0;
      }

      // remove block, move player
      world[y][x] = null;
      playerX = x;
      playerY = y;
      depth++;

      applyGravity();

      // ensure enough rows
      while (playerY + 5 >= world.length) addRow();

      // health check
      if (health <= 0) {
        gameActive = false;
        showMessage('💀 GAME OVER · depth ' + Math.floor(depth), 4000);
        setTimeout(() => location.reload(), 4500);
      }

      draw();
    }

    // passive healing
    setInterval(() => {
      if (!gameActive) return;
      const now = Date.now();
      if (health < maxHealth && (now - lastHealTime) >= 5000) {
        health = Math.min(maxHealth, health + 1);
        lastHealTime = now;
        draw();
      }
    }, 1000);

    // initial draw
    draw();

    // extra: click on player tile does nothing (but we block via mine logic)
    window.addEventListener('load', () => {
      // small tutorial
      setTimeout(() => {
        showMessage('⛏ mine adjacent blocks · combos boost score!', 2800);
      }, 400);
    });

  })();
</script>
</body>
</html>
