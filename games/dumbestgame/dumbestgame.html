<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A simple game</title>
  <link rel="icon" type="image/x-icon" href="../../icon.jpg">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0b1120;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    .card {
      max-width: 580px;
      width: 100%;
      background: #131e2f;
      border-radius: 2.5rem;
      padding: 2.5rem 2rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      border: 1px solid #2a3a52;
      transition: all 0.2s;
      text-align: center;
    }

    h1 {
      font-weight: 400;
      font-size: 1.8rem;
      letter-spacing: 0.5px;
      color: #d6e3f0;
      margin-top: 0;
      margin-bottom: 0.35rem;
    }

    .sub {
      color: #7e92ab;
      font-size: 0.95rem;
      border-bottom: 1px solid #253446;
      padding-bottom: 1rem;
      margin-bottom: 1.8rem;
    }

    /* ONE BIG BUTTON */
    .big-btn {
      background: #2b4b6f;
      border: none;
      border-radius: 6rem;
      padding: 2rem 1.5rem;
      width: 100%;
      font-size: 2.2rem;
      font-weight: 500;
      color: white;
      letter-spacing: 2px;
      box-shadow: 0 10px 0 #0f1a2b, 0 8px 20px rgba(0, 0, 0, 0.5);
      cursor: pointer;
      transition: all 0.07s ease;
      margin: 1.2rem 0 2rem;
      text-transform: uppercase;
      border: 1px solid #4b7299;
    }

    .big-btn:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #0f1a2b;
    }

    .big-btn:hover {
      background: #32628a;
    }

    /* stats grid – clean & calm */
    .stats {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem 0.5rem;
      margin: 1.8rem 0 1.2rem;
    }

    .stat-item {
      background: #0d1727;
      border-radius: 2rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid #253a52;
      flex: 1 0 auto;
      min-width: 80px;
    }

    .stat-label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7f96b3;
    }

    .stat-value {
      font-weight: 600;
      font-size: 1.3rem;
      color: #e2edfc;
      line-height: 1.4;
    }

    .stat-value.global {
      color: #9fc5ff;
    }

    hr {
      border: none;
      border-top: 1px solid #253a52;
      margin: 1.2rem 0;
    }

    .footer-note {
      font-size: 0.75rem;
      color: #5e748d;
      margin-top: 1.5rem;
      letter-spacing: 0.3px;
    }

    .badge {
      display: inline-block;
      background: #1f3147;
      padding: 0.2rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #b6cee8;
    }

    .click-feedback {
      min-height: 2.4rem;
      font-size: 0.95rem;
      color: #b6d0ea;
      background: #0d1a2b;
      border-radius: 40px;
      padding: 0.4rem 1.2rem;
      display: inline-block;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

<div class="card">

  <h1>a simple game</h1>
  <div class="sub">let's see how far this goes</div>

  <!-- main action -->
  <button class="big-btn" id="clickButton">click</button>

  <!-- local stats (left) + cloud stats (right) -->
  <div class="stats">
    <div class="stat-item">
      <span class="stat-label">your clicks</span>
      <span class="stat-value" id="localClicks">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">🌍 global clicks</span>
      <span class="stat-value global" id="globalClicks">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">👁️ page views</span>
      <span class="stat-value global" id="pageViews">0</span>
    </div>
  </div>

  <!-- feedback message (simple) -->
  <div class="click-feedback" id="feedback">click the button</div>

  <hr>
  <div class="footer-note">
    <a href="https://infinity-nexus.pages.dev/" target="_blank" rel="noopener noreferrer"><span class="badge">made by infinity nexus</span></a> &nbsp; | &nbsp; <span id="connectionStatus">● live</span>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ----- DOM refs -----
    const clickBtn = document.getElementById('clickButton');
    const localClicksEl = document.getElementById('localClicks');
    const globalClicksEl = document.getElementById('globalClicks');
    const pageViewsEl = document.getElementById('pageViews');
    const feedbackEl = document.getElementById('feedback');
    const statusEl = document.getElementById('connectionStatus');

    // ----- STATE (local) -----
    let localClickCount = 0;             // total clicks by this user
    let globalClickCount = 0;            // cached cloud value
    let pageViewCount = 0;               // cached cloud value

    // ----- cloud variable keys (simulated) -----
    // in a real server environment these would be database keys.
    // we simulate cloud storage using localStorage + broadcast.
    const CLOUD_KEY_CLICKS = 'cloud_global_clicks';
    const CLOUD_KEY_VIEWS = 'cloud_page_views';

    // ----- helper: read cloud values from storage -----
    function fetchCloudValues() {
      try {
        const storedClicks = localStorage.getItem(CLOUD_KEY_CLICKS);
        const storedViews = localStorage.getItem(CLOUD_KEY_VIEWS);
        globalClickCount = storedClicks ? parseInt(storedClicks, 10) : 0;
        pageViewCount = storedViews ? parseInt(storedViews, 10) : 0;
        // if NaN, fallback to 0
        if (isNaN(globalClickCount)) globalClickCount = 0;
        if (isNaN(pageViewCount)) pageViewCount = 0;
      } catch (_) {
        globalClickCount = 0;
        pageViewCount = 0;
      }
    }

    // ----- persist cloud values (simulate server update) -----
    function pushCloudClicks(value) {
      try {
        localStorage.setItem(CLOUD_KEY_CLICKS, String(value));
      } catch (_) { /* ignore */ }
    }

    function pushCloudViews(value) {
      try {
        localStorage.setItem(CLOUD_KEY_VIEWS, String(value));
      } catch (_) { /* ignore */ }
    }

    // ----- increment global clicks (atomic simulation) -----
    function incrementGlobalClicks() {
      // read fresh
      let current = 0;
      try {
        const raw = localStorage.getItem(CLOUD_KEY_CLICKS);
        current = raw ? parseInt(raw, 10) : 0;
        if (isNaN(current)) current = 0;
      } catch (_) { current = 0; }
      const newVal = current + 1;
      pushCloudClicks(newVal);
      globalClickCount = newVal;
      return newVal;
    }

    // ----- increment page views (called once per session) -----
    function incrementPageViews() {
      let current = 0;
      try {
        const raw = localStorage.getItem(CLOUD_KEY_VIEWS);
        current = raw ? parseInt(raw, 10) : 0;
        if (isNaN(current)) current = 0;
      } catch (_) { current = 0; }
      const newVal = current + 1;
      pushCloudViews(newVal);
      pageViewCount = newVal;
      return newVal;
    }

    // ----- update UI (local + cloud) -----
    function refreshUI() {
      localClicksEl.textContent = localClickCount;
      globalClicksEl.textContent = globalClickCount;
      pageViewsEl.textContent = pageViewCount;
    }

    // ----- handle click (one button) -----
    function handleMainClick() {
      // 1. increment local
      localClickCount += 1;
      // 2. increment global cloud (simulated server)
      const newGlobal = incrementGlobalClicks();
      // 3. update UI
      refreshUI();
      // 4. feedback
      feedbackEl.textContent = `✅ +1  (global: ${newGlobal})`;
      // quick animation / pulse
      clickBtn.style.transform = 'scale(0.97)';
      setTimeout(() => { clickBtn.style.transform = ''; }, 100);
    }

    // ----- init: page view tracking (cloud var #2) -----
    function initPageView() {
      // check if we already counted this session (sessionStorage flag)
      let counted = false;
      try {
        counted = sessionStorage.getItem('pageViewCounted') === 'true';
      } catch (_) { /* ignore */ }

      if (!counted) {
        const newViews = incrementPageViews();
        // set flag so we don't count again in this session
        try {
          sessionStorage.setItem('pageViewCounted', 'true');
        } catch (_) { /* ignore */ }
        // update UI
        refreshUI();
        feedbackEl.textContent = `👋 page view #${newViews}`;
        statusEl.textContent = '● live';
      } else {
        // still fetch latest views from cloud
        fetchCloudValues();
        refreshUI();
        feedbackEl.textContent = 'welcome back';
      }
    }

    // ----- sync with other tabs (simulate server broadcast) -----
    // when another tab changes cloud values, we reflect them.
    function storageListener(e) {
      if (e.key === CLOUD_KEY_CLICKS) {
        const val = e.newValue ? parseInt(e.newValue, 10) : 0;
        if (!isNaN(val)) {
          globalClickCount = val;
          refreshUI();
        }
      }
      if (e.key === CLOUD_KEY_VIEWS) {
        const val = e.newValue ? parseInt(e.newValue, 10) : 0;
        if (!isNaN(val)) {
          pageViewCount = val;
          refreshUI();
        }
      }
    }
    window.addEventListener('storage', storageListener);

    // ----- attach click event -----
    clickBtn.addEventListener('click', handleMainClick);

    // ----- start: fetch cloud, init page view, render -----
    fetchCloudValues();
    initPageView();  // increments views if not counted
    refreshUI();

    // extra: if page view count was 0 after init, we already incremented.
    // but if it failed, we show fallback.
    // also ensure that pageViewCount is at least 1 if sessionStorage flag is set.
    // but we already called initPageView, which handles it.

    // ----- small status indicator (optional) -----
    // show if storage is available (it always is in modern browsers)
    try {
      if (!window.localStorage) {
        statusEl.textContent = '⚠️ storage unavailable';
      }
    } catch (_) {
      statusEl.textContent = '⚠️ error';
    }

    // ----- one more sync after 2s (for safety) -----
    setTimeout(() => {
      fetchCloudValues();
      refreshUI();
      // if page views still zero but session flag says counted, force correct.
      try {
        if (sessionStorage.getItem('pageViewCounted') === 'true' && pageViewCount === 0) {
          // re-fetch
          const storedViews = localStorage.getItem(CLOUD_KEY_VIEWS);
          if (storedViews) {
            const v = parseInt(storedViews, 10);
            if (!isNaN(v) && v > 0) {
              pageViewCount = v;
              refreshUI();
            }
          }
        }
      } catch (_) { /* ignore */ }
    }, 300);

    // ----- expose for debugging (optional) -----
    console.log('🔘 one-button game · cloud vars: clicks & views');
    console.log('   global clicks:', globalClickCount, 'page views:', pageViewCount);

  })();
</script>

</body>
</html>
