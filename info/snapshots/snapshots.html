<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Mystery Reveal</title>
  <link rel="icon" href="../../icon.jpg" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Trebuchet MS&display=swap" rel="stylesheet">

  <style>
        :root[data-theme="dark"] {
            --primary: #7c3aed;
            --secondary: #ec4899;
            --bg-primary: #0f172a;
            --bg-secondary: #1a1f3a;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --header-bg: #1a202c;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-hover: rgba(0, 0, 0, 0.5);
        }

        :root[data-theme="light"] {
            --primary: #7c3aed;
            --secondary: #ec4899;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --card-bg: #f1f5f9;
            --header-bg: #f0f4f8;
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow: rgba(0, 0, 0, 0.1);
            --shadow-hover: rgba(0, 0, 0, 0.15);
        }

        :root {
            color-scheme: dark light;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

    .container {
      text-align: center;
      z-index: 2;
      position: relative;
    }

    img {
      width: 500px;
      max-width: 90vw;
      border-radius: 20px;
      border-color: rgba(255, 255, 255, 0.3);
      border-style: solid;
      border-width: 3px;
      opacity: 0;
      filter: blur(15px) brightness(0.3);
      transition: opacity 1s linear, filter 1s linear;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    img.visible {
      animation: imagePulse 0.5s ease-out;
    }

    @keyframes imagePulse {
      0% {
        transform: scale(0.95);
      }

      100% {
        transform: scale(1);
      }
    }

    h2 {
      font-weight: 400;
      margin-top: 30px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.2rem;
      letter-spacing: 1px;
      animation: fadeInText 0.8s ease-out;
    }

    @keyframes fadeInText {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .countdown {
      display: inline-block;
      padding: 10px 20px;
      background: rgba(110, 142, 251, 0.2);
      border: 2px solid rgba(167, 119, 227, 0.4);
      border-radius: 20px;
      color: rgba(255, 255, 255, 0.95);
      font-size: 0.95rem;
      margin-top: 10px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .countdown.active {
      animation: countdownPulse 1.5s ease-in-out infinite;
    }

    @keyframes countdownPulse {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(110, 142, 251, 0.2);
      }

      50% {
        box-shadow: 0 0 40px rgba(110, 142, 251, 0.4);
      }
    }
  </style>
</head>

<body>
  <nav class="navbar" style="position: fixed; top: 0; right: 0; background: var(--header-bg); padding: 16px 20px; border-bottom: 1px solid var(--border-color); z-index: 1000; display: flex; gap: 10px;" aria-label="Theme navigation">
    <button id="themeToggle" style="background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 1.2rem;" aria-label="Toggle theme"><span id="themeIcon">🌙</span></button>
  </nav>
  <div class="container">
    <img id="mystery" src="mystery.png" alt="Mystery">
    <h2 id="text" class="countdown"></h2>
  </div>
  <script>
    const img = document.getElementById('mystery');
    const text = document.getElementById('text');


    const targetDate = new Date(2026, 2, 4); // Mar 4, 2026
    const fadeDays = 30;
    const now = new Date();

    const diffDays = Math.floor((targetDate - now) / (1000 * 60 * 60 * 24));
    const progress = Math.min(1, Math.max(0, 1 - diffDays / fadeDays));

    img.style.opacity = progress;
    img.style.filter = `blur(${15 - progress * 8}px) brightness(${0.3 + progress * 0.2})`;

    if (diffDays > 0) {
      text.textContent = `Revealing in ${diffDays} day${diffDays === 1 ? '' : 's'}...`;
      text.classList.add('active');
    } else {
      text.textContent = `Fully revealed!`;
      img.classList.add('visible');
      text.classList.remove('active');
    }
  </script>
  <script>
    // Theme Toggle Functionality
    function initTheme() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
    }

    function updateThemeIcon(theme) {
        const icon = document.getElementById('themeIcon');
        icon.textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
    }

    document.addEventListener('DOMContentLoaded', function () {
        initTheme();
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    });
  </script>
</body>

</html>
